name: TVS Daily Data Push

on:
  schedule:
    - cron: "0 6 * * *"    # 11:30 AM IST (UTC+5:30) — 30-min buffer for GitHub queue lag
  workflow_dispatch:         # allow manual runs from GitHub UI

concurrency:
  group: tvs-data-push
  cancel-in-progress: false  # never cancel a running push; queue instead

jobs:
  push-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed for the keep-alive commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run data push
        run: python push_tvs_data.py

      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last_run.txt
          git add last_run.txt
          git commit -m "chore: pipeline run $(date -u '+%Y-%m-%d') [skip ci]"
          git push
