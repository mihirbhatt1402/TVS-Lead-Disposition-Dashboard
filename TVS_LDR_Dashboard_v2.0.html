<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TVS Lead Disposition Dashboard v2.0</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E31837;--red-d:#B01229;--red-m:#FF2A47;
  --red-50:#FFF0F2;--red-100:#FFD6DB;--red-200:#FFAAB3;
  --navy:#001F5B;--blue:#003087;--blue-m:#0044B4;
  --blue-50:#F0F4FF;--blue-100:#DBEAFE;--blue-200:#93C5FD;
  --gold:#F5A623;--gold-light:#FEF3C7;
  --teal:#0D9488;--green:#16A34A;--purple:#7C3AED;
  --paid-clr:#7C3AED;--paid-light:#EDE9FE;
  --org-clr:#059669;--org-light:#D1FAE5;
  --dur-fast:120ms;--dur-base:200ms;
  --shadow-1:0 2px 8px rgba(0,0,0,.08),0 0 0 1px rgba(227,24,55,.10);
  --shadow-card:0 4px 16px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05)
}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
.fade-up{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── KPI cards ── */
.kpi{position:relative;background:#fff;border-radius:14px;padding:16px 18px 14px;box-shadow:var(--shadow-card);overflow:hidden;border:1px solid #E2E8F0}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#64748B;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:800;color:#0f172a;letter-spacing:-.03em;font-family:'DM Mono',monospace}
.kpi-sub{font-size:10px;color:var(--red);margin-top:4px;font-family:'DM Mono',monospace;font-weight:600}
.card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;box-shadow:var(--shadow-card)}

/* ── Tab nav ── */
.tab-pill{padding:10px 22px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#64748B;transition:all var(--dur-fast);font-family:inherit;white-space:nowrap}
.tab-pill.active{color:var(--red-d);border-bottom-color:var(--red)}
.tab-pill:hover:not(.active){color:#0f172a;background:var(--red-50)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{padding:9px 12px;font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#1A237E;background:#E8EAF6;text-align:center;border:1px solid #C5CAE9;white-space:nowrap;position:sticky;top:0;z-index:2}
th.left{text-align:left}
th.sub{background:#C5CAE9;font-size:8.5px;color:#283593;position:sticky;top:33px;z-index:1;font-weight:600;letter-spacing:.06em;border:1px solid #9FA8DA}
th.grp-toggle{cursor:pointer;user-select:none}
th.grp-toggle:hover{filter:brightness(.94)}
td{padding:7px 12px;border:1px solid #E2E8F0;font-size:11.5px;text-align:center;font-family:'DM Mono',monospace;background:#fff;vertical-align:middle}
td.label{text-align:left;font-family:'Inter',system-ui,sans-serif;font-weight:600;font-size:12px;color:#0f172a;background:#fff;position:sticky;left:0;z-index:1;border-right:2px solid #E2E8F0;white-space:nowrap}
td.sub-label{text-align:left;font-family:'Inter',system-ui,sans-serif;font-weight:500;font-size:11px;color:#475569;background:#FAFAFA;position:sticky;left:0;z-index:1;border-right:2px solid #E2E8F0;padding-left:28px;white-space:nowrap}
tr:hover td{background:#FFF0F2}
tr:hover td.label{background:#FFF0F2}
tr:hover td.sub-label{background:#FFF0F2}
tr.total-row td{background:#F5F5F5;color:#1A1A2E;font-weight:700;border-color:#CFD8DC}
tr.total-row td.label{background:#ECEFF1;color:#1A237E;font-family:'Inter',system-ui,sans-serif}
tr.section-row td{background:#E3F2FD;font-weight:700;color:#0D47A1;border-top:2px solid #90CAF9;cursor:pointer}
tr.section-row:hover td{background:#BBDEFB}
tr.sub-row td{background:#FAFAFA}
tr.sub-row:hover td{background:#FFF0F2}
tr.city-row td{background:#F0FDF4}
tr.city-row:hover td{background:#DCFCE7}
tr.dealer-row td{background:#FAFAFA;border-top:none}
tr.dealer-row:hover td{background:#FEF3C7}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-red{background:#FEE2E2;color:#B91C1C}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-gray{color:#94A3B8;font-family:'DM Mono',monospace;font-size:10px}
.scroll-x{overflow-x:auto}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;margin-bottom:14px;flex-wrap:wrap;box-shadow:var(--shadow-card)}
.filter-bar label{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.ms-btn{display:inline-flex;align-items:center;gap:5px;border:1px solid #CBD5E1;border-radius:20px;padding:4px 12px;font-size:11px;font-family:inherit;background:#fff;cursor:pointer;color:#0f172a;box-shadow:0 1px 2px rgba(0,0,0,.04);white-space:nowrap;transition:all var(--dur-fast)}
.ms-btn:hover,.ms-btn.open{border-color:var(--red);background:var(--red-50);color:var(--red-d)}
.ms-btn .ms-count{background:var(--red);color:#fff;border-radius:9px;padding:1px 6px;font-size:9px;font-weight:700}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:200px;max-width:280px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:500;overflow:hidden}
.ms-dropdown-header{padding:8px 12px 6px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between}
.ms-dropdown-list{max-height:220px;overflow-y:auto;padding:4px 0}
.ms-option{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:11px;transition:background var(--dur-fast)}
.ms-option:hover{background:var(--red-50)}
.ms-option input[type=checkbox]{accent-color:var(--red);width:13px;height:13px;cursor:pointer}
.ms-option.all-opt{font-weight:700;border-bottom:1px solid #F1F5F9;margin-bottom:2px}

/* ── Buttons ── */
.btn{padding:8px 20px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--dur-fast)}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-d)}
.btn-secondary{background:#F1F5F9;color:#475569;border:1px solid #E2E8F0}
.btn-secondary:hover{background:#E2E8F0}
.btn-ghost{background:none;border:1px solid #E2E8F0;color:#475569;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--dur-fast)}
.btn-ghost:hover{background:var(--red-50);border-color:var(--red);color:var(--red-d)}

/* ── Misc ── */
.section-title{font-size:11px;font-weight:700;color:#334155;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:#E2E8F0}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;font-size:11px;color:#B91C1C;margin-top:8px}
.spinner{width:20px;height:20px;border:2px solid #FFD6DB;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.cell-hot{background:#BBF7D0!important}
.cell-warm{background:#FEF08A!important}
.cell-cold{background:#FECDD3!important}
.cell-nil{background:#F1F5F9!important;color:#94A3B8!important}
.prog-track{flex:1;height:6px;background:#F1F5F9;border-radius:3px;overflow:hidden;min-width:50px}
.prog-fill{height:100%;background:var(--red);border-radius:3px}

/* ── Auth screens ── */
.auth-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#001F5B 0%,#B01229 100%);z-index:1000}
.auth-card{background:#fff;border-radius:20px;padding:40px 44px;max-width:440px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#B01229,#E31837);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.04em;flex-shrink:0}
.auth-title{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:4px;letter-spacing:-.03em}
.auth-subtitle{font-size:12px;color:#64748B;margin-bottom:24px;line-height:1.5}
.auth-label{display:block;font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.auth-input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;color:#0f172a;outline:none;transition:border-color 160ms}
.auth-input:focus{border-color:var(--red)}
.auth-input-wrap{margin-bottom:14px}
.auth-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 160ms;margin-top:4px}
.auth-btn:hover{background:var(--red-d)}
.auth-btn:disabled{background:#CBD5E1;cursor:not-allowed}
.auth-note{font-size:10px;color:#94A3B8;text-align:center;margin-top:16px;line-height:1.5}
.auth-err{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:8px 12px;font-size:11px;color:#B91C1C;margin-bottom:12px}
.auth-ok{background:#DCFCE7;border:1px solid #BBF7D0;border-radius:8px;padding:8px 12px;font-size:11px;color:#166534;margin-bottom:12px}
.auth-back{background:none;border:none;color:#94A3B8;font-size:11px;cursor:pointer;font-family:inherit;margin-top:12px;text-decoration:underline;display:block;text-align:center}
.auth-back:hover{color:#475569}
/* ── Admin modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:900}
.modal-box{background:#fff;border-radius:16px;padding:28px 32px;max-width:660px;width:94%;max-height:82vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal-title{font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px}
.modal-sub{font-size:11px;color:#64748B;margin-bottom:18px}
.req-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #E2E8F0;border-radius:10px;margin-bottom:8px;gap:12px;flex-wrap:wrap}
.req-card-info{flex:1;min-width:0}
.req-card-name{font-size:13px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-card-email{font-size:11px;color:#64748B;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-card-time{font-size:10px;color:#94A3B8;margin-top:2px}
.req-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.role-sel{border:1px solid #E2E8F0;border-radius:8px;padding:5px 8px;font-size:11px;font-family:inherit;cursor:pointer;background:#fff}
.btn-approve{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0;border-radius:8px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-approve:hover{background:#BBF7D0}
.btn-reject{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA;border-radius:8px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-reject:hover{background:#FECACA}
.no-pending{text-align:center;padding:32px;color:#94A3B8;font-size:13px}
/* ── User avatar chip ── */
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 6px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;cursor:default}
.user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#B01229,#E31837);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.user-name{font-size:11px;font-weight:600;color:#0f172a;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.role-full{background:#DBEAFE;color:#1D4ED8}
.role-viewer{background:#FEF3C7;color:#92400E}
.role-admin{background:#EDE9FE;color:#6D28D9}
</style>

<body>
<div id="root"></div>
<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
   CONFIG
   ════════════════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwzgnXPbCbunBblnMUrqdWg3eY9qsIwCrFxuYuvYSpxtH22l4Cs32vdkOkDhUn-qwM64w/exec';
const CACHE_KEY = 'tvs_ldr_v2_cache';

/* ════════════════════════════════════════════════════════════════════
   ACCESS CONTROL
   ════════════════════════════════════════════════════════════════════ */
const ADMIN_EMAILS     = ['mihir.bhatt@girnarsoft.com', 'aditya.kumar@girnarsoft.com'];
const ALLOWED_DOMAINS  = ['girnarsoft.com', 'girnarcare.com'];
const AUTH_SESSION_KEY = 'tvs_ldr_auth';

async function apiFetchRole(email) {
  const r = await fetch(APPS_SCRIPT_URL + '?action=checkRole&email=' + encodeURIComponent(email));
  return r.json();
}
async function apiRequestAccess(email, name) {
  const r = await fetch(APPS_SCRIPT_URL + '?action=requestAccess', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, name }),
  });
  return r.json();
}
async function apiGetPending(adminEmail) {
  const r = await fetch(APPS_SCRIPT_URL + '?action=getPending&email=' + encodeURIComponent(adminEmail));
  return r.json();
}
async function apiReview(adminEmail, targetEmail, decision, role) {
  const r = await fetch(APPS_SCRIPT_URL + '?action=reviewRequest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminEmail, targetEmail, decision, role }),
  });
  return r.json();
}

/* ════════════════════════════════════════════════════════════════════
   INDIA ZONE → STATE MAP  (used for State × Source zone grouping)
   ════════════════════════════════════════════════════════════════════ */
const INDIA_ZONE_STATES = {
  'North':     ['Delhi','Haryana','Himachal Pradesh','Jammu & Kashmir','Jammu and Kashmir','Punjab','Rajasthan','Uttarakhand','Uttar Pradesh','Chandigarh','Ladakh'],
  'West':      ['Goa','Gujarat','Maharashtra','Dadra and Nagar Haveli','Daman and Diu'],
  'South':     ['Andhra Pradesh','Karnataka','Kerala','Tamil Nadu','Telangana','Puducherry','Lakshadweep'],
  'East':      ['Bihar','Jharkhand','Odisha','Orissa','West Bengal','Sikkim'],
  'Central':   ['Chhattisgarh','Madhya Pradesh'],
  'Northeast': ['Assam','Meghalaya','Manipur','Mizoram','Nagaland','Tripura','Arunachal Pradesh'],
};
const STATE_TO_ZONE = {};
for (const [zone, states] of Object.entries(INDIA_ZONE_STATES))
  for (const st of states) STATE_TO_ZONE[st.toLowerCase()] = zone;
function getZone(st) { return STATE_TO_ZONE[(st||'').toLowerCase()] || 'Other'; }

/* ════════════════════════════════════════════════════════════════════
   BUYING DAYS BUCKETS
   ════════════════════════════════════════════════════════════════════ */
const BD_BUCKETS = ['0–7','8–14','15–30','31–60','61–90','90+'];
function bdBucket(days) {
  const d = parseInt(days) || 0;
  if (d <= 7)  return '0–7';
  if (d <= 14) return '8–14';
  if (d <= 30) return '15–30';
  if (d <= 60) return '31–60';
  if (d <= 90) return '61–90';
  return '90+';
}

/* ════════════════════════════════════════════════════════════════════
   SOURCE CLASSIFICATION
   ════════════════════════════════════════════════════════════════════ */
function classifySrc(s) {
  const n = (s || '').toLowerCase();
  if (['adword','google','sem','ppc'].some(p => n.includes(p))) return 'adwords';
  if (['facebook','fb','meta','msfb'].some(p => n.includes(p))) return 'msfb';
  if (['organic'].some(p => n.includes(p))) return 'organic';
  return 'nonms';
}
function buildSrcGroups(srcList) {
  const adw = srcList.filter(s => classifySrc(s) === 'adwords');
  const fb  = srcList.filter(s => classifySrc(s) === 'msfb');
  const org = srcList.filter(s => classifySrc(s) === 'organic');
  const nms = srcList.filter(s => classifySrc(s) === 'nonms');
  const groups = [];
  const paidSrcs = [...adw, ...fb];
  const orgSrcs  = [...org, ...nms];
  if (paidSrcs.length) groups.push({
    id:'paid', label:'PAID', color:'#7C3AED', lightColor:'#EDE9FE', srcs: paidSrcs,
    subGroups: [
      ...(adw.length ? [{ id:'adwords', label:'ADWORDS', color:'#7C3AED', lightColor:'#F3F0FF', srcs: adw }] : []),
      ...(fb.length  ? [{ id:'msfb',    label:'MS FB',   color:'#2563EB', lightColor:'#EFF6FF', srcs: fb  }] : []),
    ]
  });
  if (orgSrcs.length) groups.push({
    id:'organic', label:'ORG+NON MS', color:'#059669', lightColor:'#D1FAE5', srcs: orgSrcs,
    subGroups: [
      ...(org.length ? [{ id:'organic', label:'ORGANIC', color:'#059669', lightColor:'#F0FDF4', srcs: org }] : []),
      ...(nms.length ? [{ id:'nonms',   label:'NON MS',  color:'#0D9488', lightColor:'#CCFBF1', srcs: nms }] : []),
    ]
  });
  return groups;
}

/* ════════════════════════════════════════════════════════════════════
   REACT SETUP
   ════════════════════════════════════════════════════════════════════ */
const ce = React.createElement;
const { useState, useEffect, useMemo, useRef, useCallback, useTransition } = React;

/* ════════════════════════════════════════════════════════════════════
   DATA FETCHING
   ════════════════════════════════════════════════════════════════════ */
async function fetchData() {
  let resp;
  try { resp = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' }); }
  catch (e) { throw new Error('Network error: ' + e.message); }
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const text = await resp.text();
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) { throw new Error('JSON parse failed: ' + text.slice(0, 80)); }
  if (parsed.error) throw new Error('Server: ' + parsed.error);
  if (!parsed.maps || !parsed.monthly) throw new Error('Unexpected data format');
  return parsed;
}

/* ════════════════════════════════════════════════════════════════════
   AGGREGATION HELPERS
   ════════════════════════════════════════════════════════════════════ */
const EMPTY = Object.freeze({ l: 0, r: 0, l2r: 0 });

function fin(l, r) { return { l, r, l2r: l > 0 ? r / l * 100 : 0 }; }

/* Aggregate a compact-JSON table for ONE specific month, with optional source filter.
   Returns { grand, grandSrc, dimAggs }
   dimKeyFn(row,maps) → string dim key (or null for src-only tables)
   srcKeyFn(row,maps) → string source name
   monthKeyFn(row,maps) → string month
   extraFilter(row,maps) → bool (optional extra filter e.g. model/state filter)
*/
// makeLR: returns a [l,r] accessor for aggregation rows.
// Old format: [..., L, R]          → getLR(row) = [row[-2], row[-1]]
// New format: [..., L, R_all, R_dms, R_co] (rt_cols=1)
function makeLR(rtCols, RT) {
  if (!rtCols) return row => [row[row.length-2], row[row.length-1]];
  const ri = RT === 'dms' ? 2 : RT === 'co' ? 1 : 3; // distance from end for R
  return row => [row[row.length-4], row[row.length-ri]];
}

function aggMonth(table, maps, month, srcFilter, dimKeyFn, srcKeyFn, monthKeyFn, extraFilter, getLR) {
  const _lr = getLR || (row => [row[row.length-2], row[row.length-1]]);
  const allSrcs = !srcFilter || srcFilter.size === 0;
  const byDim = new Map();
  const bySrc = new Map();
  const byDimSrc = new Map();
  let gL = 0, gR = 0;

  for (const row of table) {
    if (monthKeyFn(row, maps) !== month) continue;
    const src = srcKeyFn ? srcKeyFn(row, maps) : null;
    if (!allSrcs && src && !srcFilter.has(src)) continue;
    if (extraFilter && !extraFilter(row, maps)) continue;
    const [l, r] = _lr(row);
    gL += l; gR += r;

    if (src) { const c = bySrc.get(src)||[0,0]; c[0]+=l; c[1]+=r; bySrc.set(src,c); }
    const dim = dimKeyFn ? dimKeyFn(row, maps) : null;
    if (dim) {
      const c = byDim.get(dim)||[0,0]; c[0]+=l; c[1]+=r; byDim.set(dim,c);
      if (src) {
        const k = dim+'\x00'+src;
        const c2 = byDimSrc.get(k)||[0,0]; c2[0]+=l; c2[1]+=r; byDimSrc.set(k,c2);
      }
    }
  }

  const grandSrc = {};
  for (const [s,v] of bySrc) grandSrc[s] = fin(v[0],v[1]);
  const dimAggs = {};
  for (const [d,dv] of byDim) {
    const srcAgg = {};
    for (const s of bySrc.keys()) {
      const v = byDimSrc.get(d+'\x00'+s);
      srcAgg[s] = v ? fin(v[0],v[1]) : EMPTY;
    }
    dimAggs[d] = { total: fin(dv[0],dv[1]), src: srcAgg };
  }
  return { grand: fin(gL,gR), grandSrc, dimAggs };
}

/* Aggregate across ALL (or selected) months — used for Overview KPIs */
function aggAll(table, maps, monthFilter, srcFilter, dimKeyFn, srcKeyFn, monthKeyFn, extraFilter, getLR) {
  const _lr = getLR || (row => [row[row.length-2], row[row.length-1]]);
  const allMonths = !monthFilter || monthFilter.size === 0;
  const allSrcs   = !srcFilter   || srcFilter.size === 0;
  const byDim = new Map();
  const bySrc = new Map();
  const byDimSrc = new Map();
  let gL = 0, gR = 0;

  for (const row of table) {
    const m = monthKeyFn(row, maps);
    if (!allMonths && !monthFilter.has(m)) continue;
    const src = srcKeyFn ? srcKeyFn(row, maps) : null;
    if (!allSrcs && src && !srcFilter.has(src)) continue;
    if (extraFilter && !extraFilter(row, maps)) continue;
    const [l, r] = _lr(row);
    gL += l; gR += r;

    if (src) { const c = bySrc.get(src)||[0,0]; c[0]+=l; c[1]+=r; bySrc.set(src,c); }
    const dim = dimKeyFn ? dimKeyFn(row, maps) : null;
    if (dim) {
      const c = byDim.get(dim)||[0,0]; c[0]+=l; c[1]+=r; byDim.set(dim,c);
      if (src) {
        const k = dim+'\x00'+src;
        const c2 = byDimSrc.get(k)||[0,0]; c2[0]+=l; c2[1]+=r; byDimSrc.set(k,c2);
      }
    }
  }

  const grandSrc = {};
  for (const [s,v] of bySrc) grandSrc[s] = fin(v[0],v[1]);
  const dimAggs = {};
  for (const [d,dv] of byDim) {
    const srcAgg = {};
    for (const s of bySrc.keys()) {
      const v = byDimSrc.get(d+'\x00'+s);
      srcAgg[s] = v ? fin(v[0],v[1]) : EMPTY;
    }
    dimAggs[d] = { total: fin(dv[0],dv[1]), src: srcAgg };
  }
  return { grand: fin(gL,gR), grandSrc, dimAggs };
}

/* ════════════════════════════════════════════════════════════════════
   FORMATTERS
   ════════════════════════════════════════════════════════════════════ */
function Nf(n) { return (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString('en-IN'); }
function Pf(n, d=1) { return (n == null || isNaN(n) || n===0) ? '—' : n.toFixed(d) + '%'; }

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthOrder(m) {
  if (!m) return 0;
  const mt = m.match(/([A-Za-z]+)'(\d+)/);
  if (!mt) return 0;
  return parseInt(mt[2]) * 12 + MONTHS.indexOf(mt[1]);
}

function l2rBadge(pct) {
  if (!pct || isNaN(pct) || pct === 0) return ce('span', { className: 'badge-gray' }, '—');
  const cls = pct >= 15 ? 'badge-green' : pct >= 8 ? 'badge-amber' : 'badge-red';
  return ce('span', { className: 'badge ' + cls }, pct.toFixed(1) + '%');
}

function cellClass(pct) {
  if (!pct || pct === 0) return 'cell-nil';
  if (pct >= 15) return 'cell-hot';
  if (pct >= 8)  return 'cell-warm';
  return 'cell-cold';
}

function grpSum(srcMap, srcs) {
  let l = 0, r = 0;
  for (const s of srcs) { const a = srcMap[s] || EMPTY; l += a.l; r += a.r; }
  return fin(l, r);
}

/* ════════════════════════════════════════════════════════════════════
   EXCEL EXPORT
   ════════════════════════════════════════════════════════════════════ */
function exportXlsx(sheetMap, filename) {
  if (!window.XLSX) { alert('XLSX library not loaded'); return; }
  const wb = window.XLSX.utils.book_new();
  for (const [name, aoa] of Object.entries(sheetMap)) {
    const ws = window.XLSX.utils.aoa_to_sheet(aoa);
    const colW = [];
    for (const row of aoa) row.forEach((c, i) => {
      const l = String(c == null ? '' : c).length;
      if (!colW[i] || l > colW[i]) colW[i] = l;
    });
    ws['!cols'] = colW.map(w => ({ wch: Math.min(w + 2, 40) }));
    window.XLSX.utils.book_append_sheet(wb, ws, String(name).slice(0, 31));
  }
  window.XLSX.writeFile(wb, filename + '.xlsx');
}

function ExportBtn({ onClick }) {
  return ce('button', {

    style: { padding:'4px 14px', fontSize:10, fontFamily:'inherit', fontWeight:700,
      border:'1px solid #93C5FD', borderRadius:20, background:'#fff',
      color:'#001F5B', cursor:'pointer', display:'inline-flex', alignItems:'center',

  }, '↓ Export Excel');
}

/* ════════════════════════════════════════════════════════════════════
   MULTI-SELECT FILTER COMPONENT
   ════════════════════════════════════════════════════════════════════ */
const MultiSelect = React.memo(function MultiSelect({ label, options, selected, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();

  useEffect(() => {
    function hdl(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', hdl);
    return () => document.removeEventListener('mousedown', hdl);
  }, []);

  const isAll = !selected || selected.size === 0;
  const count = selected ? selected.size : 0;

  function toggle(opt) {
    const next = new Set(selected || []);
    if (next.has(opt)) next.delete(opt); else next.add(opt);
    onChange(next.size === options.length ? new Set() : next);
  }
  function selectAll() { onChange(new Set()); }

  return ce('div', { style: { position:'relative' }, ref },
    ce('button', {
      className: 'ms-btn' + (open ? ' open' : ''),
      onClick: () => setOpen(p => !p)
    },
      label,
      isAll
        ? ce('span', { style:{color:'#94A3B8',fontSize:10} }, 'All ▾')
        : ce('span', { className:'ms-count' }, count),
      !isAll && ce('span', {style:{color:'#94A3B8',fontSize:10}}, '▾')
    ),
    open && ce('div', { className:'ms-dropdown' },
      ce('div', { className:'ms-dropdown-header' },
        ce('span', { style:{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.06em'} }, label),
        ce('button', { onClick: selectAll, style:{fontSize:10,background:'none',border:'none',color:'#E31837',cursor:'pointer',fontWeight:700} }, 'All')
      ),
      ce('div', { className:'ms-dropdown-list' },
        options.map(opt => ce('label', { key:opt, className:'ms-option' },
          ce('input', {
            type:'checkbox', checked: !isAll && selected.has(opt),
            onChange: () => toggle(opt)
          }),
          ce('span', null, opt)
        ))
      )
    )
  );
});

/* ════════════════════════════════════════════════════════════════════
   DIMENSION GRID WITH EXPAND/COLLAPSE SOURCE GROUPS + CONTRIB%
   agg        : { grand, grandSrc, dimAggs }
   srcGroups  : array of { id, label, color, srcs, subGroups }
   dimLabel   : string for the row header column
   expandedGrps : Set of group ids that are expanded
   onToggleGrp : (id) => void
   expandedRows : Set of dim keys where sub-rows are shown (optional)
   subRowsOf   : (dimKey) => array of { label, srcMap } (optional, for LT expand)
   ════════════════════════════════════════════════════════════════════ */
const DimGrid = React.memo(function DimGrid({
  agg, srcGroups, dimLabel, expandedGrps, onToggleGrp,
  expandedRows, onToggleRow, subRowsFn, grandForContrib, noSort, viewerMode
}) {
  if (!agg) return null;
  const { grand, grandSrc, dimAggs } = agg;
  const gL = (grandForContrib || grand).l;

  function contrib(l) { return gL > 0 ? l / gL * 100 : 0; }

  // Flatten expanded groups → visible column list (sub-groups become top-level headers)
  const visibleCols = [];
  for (const grp of srcGroups) {
    if (expandedGrps && expandedGrps.has(grp.id)) {
      const sgs = grp.subGroups.filter(sg => sg.srcs.length > 0);
      if (sgs.length > 0) {
        sgs.forEach((sg, i) => visibleCols.push({
          ...sg,
          borderLeft: i === 0 ? '2px solid ' + grp.color : null,
          parentId: grp.id,
          isChild: true
        }));
      } else {
        visibleCols.push({ ...grp, isChild: false });
      }
    } else {
      visibleCols.push({ ...grp, isChild: false });
    }
  }

  // 4 data cells for one visible column
  function colCells(srcMap, col) {
    const a = grpSum(srcMap, col.srcs);
    const bl = col.borderLeft ? { borderLeft: col.borderLeft } : {};
    return [
      ce('td', { key: col.id+'l', style: bl }, Nf(a.l)),
      ce('td', { key: col.id+'r', style:{ color: col.color, fontWeight:700 } }, Nf(a.r)),
      ce('td', { key: col.id+'c' }, a.l > 0 ? Pf(contrib(a.l)) : '—'),
      ce('td', { key: col.id+'l2r', style:{ color:'#D97706', fontWeight:600 } }, Pf(a.l2r)),
    ];
  }

  function renderRow(label, tot, srcMap, isTotal, isSection, dimKey, isSub) {
    const rowClass = isTotal ? 'total-row' : isSection ? 'section-row' : isSub ? 'sub-row' : '';
    const canExpand = !isTotal && !isSub && expandedRows !== undefined && onToggleRow;
    const isExpanded = canExpand && expandedRows.has(dimKey);
    const tdClass = isSub ? 'sub-label' : 'label';
    const labelContent = canExpand
      ? ce('span', { style:{display:'flex',alignItems:'center',gap:6} },
          ce('span', { style:{fontSize:10,color:'#94A3B8'} }, isExpanded ? '▾' : '▸'),
          label
        )
      : label;
    return ce('tr', {
      className: rowClass, key: label + (isSub ? '_sub' : ''),
      onClick: canExpand ? () => onToggleRow(dimKey) : undefined,
      style: canExpand ? { cursor:'pointer' } : {}
    },
      ce('td', { className: tdClass, style: isTotal ? { color:'#1A237E' } : {} }, labelContent),
      ce('td', { key:'tl' }, Nf(tot.l)),
      ce('td', { key:'tr', style:{ color:'#E31837', fontWeight:700 } }, Nf(tot.r)),
      ce('td', { key:'tc' }, tot.l > 0 ? Pf(contrib(tot.l)) : '—'),
      ce('td', { key:'tl2r', style:{ color:'#D97706', fontWeight:700 } }, tot.l2r > 0 ? Pf(tot.l2r) : '—'),
      ...(viewerMode ? [] : visibleCols.flatMap(col => colCells(srcMap, col)))
    );
  }

  const dimRows = noSort
    ? Object.entries(dimAggs)
    : Object.entries(dimAggs).sort((a,b) => b[1].total.l - a[1].total.l);

  // Header row 1 — top-level group names (sub-groups shown as peers when parent expanded)
  const hdr1 = [
    ce('th', { key:'dim', className:'left', rowSpan:2, style:{minWidth:160,zIndex:3,background:'#E8EAF6',color:'#1A237E'} }, dimLabel),
    ce('th', { key:'tot', colSpan:4, style:{background:'#E8EAF6',color:'#1A237E'} }, 'TOTAL'),
    ...(viewerMode ? [] : visibleCols.map(col => {
      const hasChildren = !col.isChild && col.subGroups && col.subGroups.filter(sg=>sg.srcs.length>0).length > 1;
      const canToggle = onToggleGrp && (hasChildren || col.isChild);
      const toggleId = col.isChild ? col.parentId : col.id;
      const arrow = hasChildren ? '▾ ' : col.isChild ? '▴ ' : '';
      return ce('th', {
        key: col.id, colSpan: 4,
        className: canToggle ? 'grp-toggle' : '',
        style: {
          background: col.lightColor || '#F3F4F6',
          color: col.color,
          borderTop: '2px solid ' + col.color,
          ...(col.borderLeft ? { borderLeft: col.borderLeft } : {})
        },
        onClick: canToggle ? () => onToggleGrp(toggleId) : undefined
      }, arrow + col.label);
    }))
  ];

  // Header row 2 — always LEADS / RETAIL / CONTRIB% / L2R% per visible col
  const hdr2 = [
    ce('th', { key:'tl', className:'sub' }, 'Leads'),
    ce('th', { key:'tr', className:'sub' }, 'Retail'),
    ce('th', { key:'tc', className:'sub' }, 'Contrib%'),
    ce('th', { key:'tl2r', className:'sub' }, 'L2R%'),
    ...(viewerMode ? [] : visibleCols.flatMap(col => [
      ce('th', { key:col.id+'l', className:'sub', style: col.borderLeft ? {borderLeft:col.borderLeft} : {} }, 'Leads'),
      ce('th', { key:col.id+'r', className:'sub' }, 'Retail'),
      ce('th', { key:col.id+'c', className:'sub' }, 'Contrib%'),
      ce('th', { key:col.id+'l2r', className:'sub' }, 'L2R%'),
    ]))
  ];

  const rows = [];
  rows.push(renderRow('∑ Grand Total', grand, grandSrc, true, false, null, false));

  for (const [dimKey, da] of dimRows) {
    rows.push(renderRow(dimKey, da.total, da.src, false, false, dimKey, false));
    // Sub-rows if this dim is expanded
    if (expandedRows && expandedRows.has(dimKey) && subRowsFn) {
      const subRows = subRowsFn(dimKey, da);
      for (const sr of subRows) {
        rows.push(renderRow(sr.label, sr.tot, sr.srcMap, false, false, null, true));
      }
    }
  }

  return ce('div', { className:'scroll-x' },
    ce('table', null,
      ce('thead', null,
        ce('tr', null, ...hdr1),
        ce('tr', null, ...hdr2),
      ),
      ce('tbody', null, ...rows)
    )
  );
});

/* ════════════════════════════════════════════════════════════════════
   MONTHLY GRIDS WRAPPER
   Renders one DimGrid per selected month.
   ════════════════════════════════════════════════════════════════════ */
function MonthlyGrids({ title, months, renderAgg, srcGroups, dimLabel, expandedGrps, onToggleGrp, expandedRows, onToggleRow, subRowsFn, noPrefix, viewerMode }) {
  return ce('div', { className:'fade-up' },
    months.map(M => {
      const agg = renderAgg(M);
      if (!agg || agg.grand.l === 0) return null;
      return ce('div', { key: M, className:'card', style:{ padding:'16px 18px', marginBottom:14 } },
        ce('div', { className:'section-title', style:{marginBottom:10} }, noPrefix ? M : (title || dimLabel) + ' — ' + M),
        ce(DimGrid, { agg, srcGroups, dimLabel, expandedGrps, onToggleGrp, expandedRows, onToggleRow, subRowsFn, viewerMode })
      );
    })
  );
}

/* ════════════════════════════════════════════════════════════════════
   OVERVIEW TAB
   ════════════════════════════════════════════════════════════════════ */
const OverviewTab = React.memo(function OverviewTab({ data, filters, RT }) {
  const { maps, monthly, sm, cm } = data;
  const getLR = useMemo(() => makeLR(data.rt_cols, RT), [data.rt_cols, RT]);
  const chartRef = useRef(); const chartInst = useRef();

  const allSrcs = useMemo(() => [...new Set(maps.src)], [maps]);
  const srcGroups = useMemo(() => buildSrcGroups(allSrcs), [allSrcs]);
  const paidGrp = srcGroups.find(g => g.id === 'paid');
  const orgGrp  = srcGroups.find(g => g.id === 'organic');
  const hasCityFilter = filters.cities && filters.cities.size > 0 && cm && maps.city;

  const totals = useMemo(() => {
    const allM = !filters.months || filters.months.size === 0;
    const allS = !filters.sources || filters.sources.size === 0;
    let gL=0,gR=0,pL=0,pR=0,oL=0,oR=0;
    if (hasCityFilter) {
      for (const row of cm) {
        const city = maps.city[row[0]];
        if (!filters.cities.has(city)) continue;
        const m = maps.lm[row[1]];
        if (!allM && !filters.months.has(m)) continue;
        const [l,r] = getLR(row); gL+=l; gR+=r;
      }
    } else {
      for (const row of sm) {
        const m = maps.lm[row[1]];
        if (!allM && !filters.months.has(m)) continue;
        const src = maps.src[row[0]];
        if (!allS && !filters.sources.has(src)) continue;
        const [l,r] = getLR(row); gL+=l; gR+=r;
        if (paidGrp && paidGrp.srcs.includes(src)) { pL+=l; pR+=r; }
        if (orgGrp  && orgGrp.srcs.includes(src))  { oL+=l; oR+=r; }
      }
    }
    return { l:gL,r:gR,l2r:gL>0?gR/gL*100:0, pL,pR,pL2r:pL>0?pR/pL*100:0, oL,oR,oL2r:oL>0?oR/oL*100:0 };
  }, [sm, cm, maps, filters, paidGrp, orgGrp, hasCityFilter, getLR]);

  const trendData = useMemo(() => {
    const byMonth = new Map();
    if (hasCityFilter) {
      for (const row of cm) {
        const city = maps.city[row[0]];
        if (!filters.cities.has(city)) continue;
        const m = maps.lm[row[1]];
        const cur = byMonth.get(m) || [0,0];
        const [l,r] = getLR(row); cur[0]+=l; cur[1]+=r; byMonth.set(m, cur);
      }
    } else {
      for (const row of monthly) {
        const m = maps.lm[row[0]];
        const [l,r] = getLR(row); byMonth.set(m, [l, r]);
      }
    }
    return [...byMonth.entries()]
      .sort((a,b) => monthOrder(a[0]) - monthOrder(b[0]))
      .map(([m, v]) => ({ m, l: v[0], r: v[1], l2r: v[0]>0 ? v[1]/v[0]*100 : 0 }));
  }, [monthly, cm, maps, filters, hasCityFilter, getLR]);

  const srcBreak = useMemo(() => {
    const allM = !filters.months || filters.months.size === 0;
    const allS = !filters.sources || filters.sources.size === 0;
    const bySrc = new Map();
    for (const row of sm) {
      const m = maps.lm[row[1]];
      if (!allM && !filters.months.has(m)) continue;
      const src = maps.src[row[0]];
      if (!allS && !filters.sources.has(src)) continue;
      const [l,r] = getLR(row);
      const c = bySrc.get(src)||[0,0]; c[0]+=l; c[1]+=r; bySrc.set(src,c);
    }
    return [...bySrc.entries()]
      .map(([s,v]) => ({ src:s, l:v[0], r:v[1], l2r:v[0]>0?v[1]/v[0]*100:0 }))
      .sort((a,b) => b.l-a.l);
  }, [sm, maps, filters]);

  // Chart
  useEffect(() => {
    const canvas = chartRef.current;
    if (!canvas || !window.Chart) return;
    if (chartInst.current) { try { chartInst.current.destroy(); } catch(e){} }
    chartInst.current = new Chart(canvas, {
      type:'bar',
      data:{
        labels: trendData.map(d => d.m),
        datasets:[
          { label:'Leads',   data:trendData.map(d=>d.l), backgroundColor:'#0030872a', borderColor:'#003087', borderWidth:1.5, borderRadius:3, yAxisID:'y' },
          { label:'Retails', data:trendData.map(d=>d.r), backgroundColor:'#E3183755', borderColor:'#E31837', borderWidth:1.5, borderRadius:3, yAxisID:'y' },
          { label:'L2R%',    data:trendData.map(d=>parseFloat(d.l2r.toFixed(2))), type:'line', borderColor:'#F5A623', backgroundColor:'transparent', borderWidth:2.5, pointRadius:5, pointBackgroundColor:'#F5A623', yAxisID:'y2', tension:.3 },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{position:'top',labels:{boxWidth:10,boxHeight:10,font:{size:10,family:'DM Mono,monospace'},color:'#475569'}},
          tooltip:{backgroundColor:'rgba(11,22,41,.92)',titleColor:'#DBEAFE',bodyColor:'#93C5FD',padding:10,cornerRadius:8},
        },
        scales:{
          x:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#475569',font:{size:10}}},
          y:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#475569',font:{size:10}},position:'left',beginAtZero:true,title:{display:true,text:'Volume',color:'#94a3b8',font:{size:9}}},
          y2:{position:'right',ticks:{color:'#F5A623',font:{size:10},callback:v=>v+'%'},grid:{display:false},title:{display:true,text:'L2R%',color:'#F5A623',font:{size:9}},beginAtZero:true},
        }
      }
    });
    return () => { try { if(chartInst.current) chartInst.current.destroy(); } catch(e){} };
  }, [trendData]);

  const KPIs = [
    { label:'Total Leads',        value:Nf(totals.l),                      sub:'All sources',             color:'#003087' },
    { label:'Total Retails',      value:Nf(totals.r),                      sub:'Converted',               color:'#E31837' },
    { label:'L2R %',              value:totals.l2r.toFixed(1)+'%',         sub:'Retails ÷ Leads',         color:'#F5A623' },
    { label:'Paid L2R%',          value:totals.pL2r.toFixed(1)+'%',        sub:Nf(totals.pL)+' paid leads',  color:'#7C3AED' },
    { label:'Organic L2R%',       value:totals.oL2r.toFixed(1)+'%',        sub:Nf(totals.oL)+' organic leads', color:'#059669' },
  ];

  return ce('div', { className:'fade-up' },
    ce('div', { style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:10,marginBottom:20} },
      KPIs.map((k,i) => ce('div', { key:i, className:'kpi' },
        ce('div', { style:{position:'absolute',top:0,left:0,right:0,height:3,background:k.color,borderRadius:'12px 12px 0 0'} }),
        ce('div', { className:'kpi-label' }, k.label),
        ce('div', { className:'kpi-value', style:{fontSize:k.value.length>7?16:20,color:k.color} }, k.value),
        ce('div', { className:'kpi-sub', style:{color:k.color} }, k.sub)
      ))
    ),
    ce('div', { className:'card', style:{padding:'16px 18px',marginBottom:14} },
      ce('div', { className:'section-title' }, 'Month-wise Trend — Leads, Retails & L2R%'),
      ce('div', { style:{height:260,position:'relative'} }, ce('canvas', { ref:chartRef }))
    ),
    ce('div', { className:'card', style:{padding:'16px 18px',marginBottom:14} },
      ce('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8} },
        ce('div', { className:'section-title', style:{marginBottom:0} }, hasCityFilter ? 'Source Summary (all cities — city filter applies to KPIs & trend only)' : 'Source Summary'),
        ce(ExportBtn, { onClick:() => {
          const aoa=[['Source','Leads','Retails','Contrib%','L2R%']];
          for (const s of srcBreak) aoa.push([s.src,s.l,s.r,+(s.l/totals.l*100).toFixed(2),+s.l2r.toFixed(2)]);
          aoa.push(['∑ Total',totals.l,totals.r,'100.0%',+totals.l2r.toFixed(2)]);
          exportXlsx({'Source Summary':aoa},'TVS_Overview_Source');
        }})
      ),
      ce('div', { className:'scroll-x' },
        ce('table', null,
          ce('thead', null, ce('tr', null,
            ce('th', { className:'left', style:{minWidth:140} }, 'Source'),
            ce('th', null, 'Leads'),
            ce('th', { style:{background:'#FFEBEE',color:'#B71C1C'} }, 'Retails'),
            ce('th', null, 'Contrib%'),
            ce('th', { style:{background:'#FFF8E1',color:'#E65100'} }, 'L2R%'),
          )),
          ce('tbody', null,
            ...srcBreak.map((s,i) => ce('tr', { key:i },
              ce('td', { className:'label' }, s.src),
              ce('td', null, Nf(s.l)),
              ce('td', { style:{color:'#E31837',fontWeight:700} }, Nf(s.r)),
              ce('td', null, totals.l > 0 ? Pf(s.l/totals.l*100) : '—'),
              ce('td', { style:{color:'#D97706',fontWeight:600} }, Pf(s.l2r)),
            )),
            ce('tr', { className:'total-row' },
              ce('td', { className:'label' }, '∑ Grand Total'),
              ce('td', null, Nf(totals.l)),
              ce('td', { style:{color:'#E31837',fontWeight:700} }, Nf(totals.r)),
              ce('td', null, '100.0%'),
              ce('td', null, ce('span', { style:{color:'#D97706',fontWeight:700} }, totals.l2r.toFixed(1)+'%')),
            )
          )
        )
      )
    )
  );
});

/* ════════════════════════════════════════════════════════════════════
   SOURCE ANALYSIS TAB
   ════════════════════════════════════════════════════════════════════ */
const SourceTab = React.memo(function SourceTab({ data, filters, months, RT }) {
  const { maps, sm } = data;
  const getLR = useMemo(() => makeLR(data.rt_cols, RT), [data.rt_cols, RT]);
  const allSrcs = useMemo(() => [...new Set(maps.src)], [maps]);
  const srcGroups = useMemo(() => buildSrcGroups(allSrcs), [allSrcs]);
  const [expandedGrps, setExpandedGrps] = useState(new Set());
  const onToggleGrp = useCallback(id => setExpandedGrps(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  }), []);

  const renderAgg = useCallback((M) => {
    const allS = !filters.sources || filters.sources.size === 0;
    const bySrc = new Map();
    let gL=0,gR=0;
    for (const row of sm) {
      if (maps.lm[row[1]] !== M) continue;
      const src = maps.src[row[0]];
      if (!allS && !filters.sources.has(src)) continue;
      const [l,r] = getLR(row); gL+=l; gR+=r;
      const c=bySrc.get(src)||[0,0]; c[0]+=l; c[1]+=r; bySrc.set(src,c);
    }
    const grand = fin(gL,gR);
    const grandSrc = {};
    const dimAggs = {};
    for (const [src,[l,r]] of bySrc) {
      grandSrc[src] = fin(l,r);
      dimAggs[src] = { total: fin(l,r), src: { [src]: fin(l,r) } };
    }
    return { grand, grandSrc, dimAggs };
  }, [sm, maps, filters, getLR]);

  return ce(MonthlyGrids, { months, renderAgg, srcGroups, dimLabel:'Source', expandedGrps, onToggleGrp, noPrefix: true });
});

/* ════════════════════════════════════════════════════════════════════
   STATE × SOURCE TAB  (Zone → State → City → Dealer drill-down)
   ════════════════════════════════════════════════════════════════════ */
const StateSourceTab = React.memo(function StateSourceTab({ data, filters, months, RT, viewerMode }) {
  const { maps, stm } = data;
  const cm        = data.cm   || [];
  const cdm       = data.cdm  || [];
  const csm_data  = data.csm  || [];
  const cdsm_data = data.cdsm || [];
  const getLR = useMemo(() => makeLR(data.rt_cols, RT), [data.rt_cols, RT]);
  const hasCities    = !!(maps.city && maps.city_state && cm.length > 0);
  const hasDealers   = !!(maps.dl && cdm.length > 0);
  const hasCitySrc   = csm_data.length > 0;
  const hasDealerSrc = cdsm_data.length > 0;

  const allSrcs   = useMemo(() => [...new Set(maps.src)], [maps]);
  const srcGroups = useMemo(() => buildSrcGroups(allSrcs), [allSrcs]);
  const [expandedGrps, setExpandedGrps] = useState(new Set());
  const onToggleGrp = useCallback(id => setExpandedGrps(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  }), []);

  // Exclusive accordion — only one node open per level
  const [openZone,  setOpenZone]  = useState(null);
  const [openState, setOpenState] = useState(null);
  const [openCity,  setOpenCity]  = useState(null);

  const onClickZone  = useCallback(z => { setOpenZone(p => p===z?null:z); setOpenState(null); setOpenCity(null); }, []);
  const onClickState = useCallback(s => { setOpenState(p => p===s?null:s); setOpenCity(null); }, []);
  const onClickCity  = useCallback(c => { setOpenCity(p => p===c?null:c); }, []);

  // Precompute city → index reverse map (O(1) lookup vs indexOf)
  const cityIndexMap = useMemo(() => {
    if (!maps.city) return new Map();
    return new Map(maps.city.map((c,i) => [c,i]));
  }, [maps.city]);

  const renderMonthGrid = useCallback((M) => {
    const allSrcF  = !filters.sources || filters.sources.size === 0;
    const allStateF = !filters.states  || filters.states.size  === 0;

    // ── State × Source totals ──
    const stateData = new Map(); // state → { total:[l,r], byS: Map<src,[l,r]> }
    let gL=0, gR=0;
    const grandSrcMap = new Map();

    for (const row of stm) {
      if (maps.lm[row[2]] !== M) continue;
      const state = maps.st[row[0]];
      if (!allStateF && !filters.states.has(state)) continue;
      const src = maps.src[row[1]];
      if (!allSrcF && !filters.sources.has(src)) continue;
      const [l,r]=getLR(row);
      gL+=l; gR+=r;
      if (!stateData.has(state)) stateData.set(state, { total:[0,0], byS:new Map() });
      const sd = stateData.get(state);
      sd.total[0]+=l; sd.total[1]+=r;
      const c = sd.byS.get(src)||[0,0]; c[0]+=l; c[1]+=r; sd.byS.set(src,c);
      const gc = grandSrcMap.get(src)||[0,0]; gc[0]+=l; gc[1]+=r; grandSrcMap.set(src,gc);
    }

    // ── City totals for the open state (from cm + city_state map) ──
    const cityData = new Map(); // city → [l,r]
    if (openState && hasCities) {
      for (const row of cm) {
        if (maps.lm[row[1]] !== M) continue;
        const cti = row[0];
        const sti = maps.city_state[cti];
        if (sti == null || maps.st[sti] !== openState) continue;
        const city = maps.city[cti];
        const cur = cityData.get(city)||[0,0];
        const [cl,cr]=getLR(row); cur[0]+=cl; cur[1]+=cr; cityData.set(city, cur);
      }
    }

    // ── City × Source breakdown ──
    const citySourceByS = new Map(); // city → Map<src,[l,r]>
    if (openState && hasCitySrc) {
      for (const row of csm_data) {
        if (maps.lm[row[2]] !== M) continue;
        const cti = row[0];
        const sti = maps.city_state[cti];
        if (sti == null || maps.st[sti] !== openState) continue;
        const city = maps.city[cti];
        const src  = maps.src[row[1]];
        if (!citySourceByS.has(city)) citySourceByS.set(city, new Map());
        const bySrc = citySourceByS.get(city);
        const cur = bySrc.get(src)||[0,0];
        const [cl,cr]=getLR(row); cur[0]+=cl; cur[1]+=cr; bySrc.set(src,cur);
      }
    }

    // ── Dealer totals for the open city (from cdm) ──
    const dealerData = new Map(); // dealer → [l,r]
    if (openCity && hasDealers) {
      const oci = cityIndexMap.get(openCity) ?? -1;
      if (oci >= 0) {
        for (const row of cdm) {
          if (row[0] !== oci) continue;
          if (maps.lm[row[2]] !== M) continue;
          const dl = maps.dl[row[1]];
          const cur = dealerData.get(dl)||[0,0];
          const [dll,dlr]=getLR(row); cur[0]+=dll; cur[1]+=dlr; dealerData.set(dl, cur);
        }
      }
    }

    // ── Dealer × Source breakdown ──
    const dealerSourceByS = new Map(); // dealer → Map<src,[l,r]>
    if (openCity && hasDealerSrc) {
      const oci = cityIndexMap.get(openCity) ?? -1;
      if (oci >= 0) {
        for (const row of cdsm_data) {
          if (row[0] !== oci) continue;
          if (maps.lm[row[3]] !== M) continue;
          const dl  = maps.dl[row[1]];
          const src = maps.src[row[2]];
          if (!dealerSourceByS.has(dl)) dealerSourceByS.set(dl, new Map());
          const bySrc = dealerSourceByS.get(dl);
          const cur = bySrc.get(src)||[0,0];
          const [dll,dlr]=getLR(row); cur[0]+=dll; cur[1]+=dlr; bySrc.set(src,cur);
        }
      }
    }

    // ── Group states into zones ──
    const zoneData = new Map();
    for (const [state, sd] of stateData) {
      const zone = getZone(state);
      if (!zoneData.has(zone)) zoneData.set(zone, { states:[], total:[0,0], bySrc:new Map() });
      const zd = zoneData.get(zone);
      zd.states.push(state);
      zd.total[0]+=sd.total[0]; zd.total[1]+=sd.total[1];
      for (const [src,[l,r]] of sd.byS) {
        const c = zd.bySrc.get(src)||[0,0]; c[0]+=l; c[1]+=r; zd.bySrc.set(src,c);
      }
    }

    const grandSrc = {};
    for (const [s,v] of grandSrcMap) grandSrc[s] = fin(v[0],v[1]);
    const grand = fin(gL,gR);
    const ZONE_ORDER = ['North','West','South','East','Central','Northeast','Other'];

    function buildSrcMap(bySrc) {
      const sm = {};
      for (const [s,v] of bySrc) sm[s] = fin(v[0],v[1]);
      return sm;
    }

    function grpCells(srcMap, grp) {
      const exp = expandedGrps.has(grp.id);
      if (!exp) {
        const a = grpSum(srcMap, grp.srcs);
        return [
          ce('td',{key:grp.id+'l',style:{borderLeft:'2px solid '+grp.color+'44'}},Nf(a.l)),
          ce('td',{key:grp.id+'r',style:{color:grp.color,fontWeight:700}},Nf(a.r)),
          ce('td',{key:grp.id+'c'},gL>0?Pf(a.l/gL*100):'—'),
          ce('td',{key:grp.id+'l2r',style:{color:'#D97706',fontWeight:600}},Pf(a.l2r)),
        ];
      }
      return grp.subGroups.filter(sg=>sg.srcs.length>0).flatMap((sg,si) => {
        const a = grpSum(srcMap,sg.srcs);
        return [
          ce('td',{key:sg.id+'l',style:si===0?{borderLeft:'2px solid '+grp.color+'44'}:{}},Nf(a.l)),
          ce('td',{key:sg.id+'r',style:{color:sg.color,fontWeight:700}},Nf(a.r)),
          ce('td',{key:sg.id+'c'},gL>0?Pf(a.l/gL*100):'—'),
          ce('td',{key:sg.id+'l2r',style:{color:'#D97706',fontWeight:600}},Pf(a.l2r)),
        ];
      });
    }

    // Blank source cells for city/dealer rows (no source breakdown at those levels)
    function blankSrcCells(bgColor) {
      return srcGroups.flatMap((grp,gi) => {
        const exp = expandedGrps.has(grp.id);
        const slots = exp ? grp.subGroups.filter(sg=>sg.srcs.length>0).length : 1;
        return Array.from({length:slots},(_,i) => [
          ce('td',{key:grp.id+i+'l',style:{color:'#CBD5E1',background:bgColor,borderLeft:i===0?'2px solid '+grp.color+'22':undefined}},''),
          ce('td',{key:grp.id+i+'r',style:{color:'#CBD5E1',background:bgColor}},''),
          ce('td',{key:grp.id+i+'c',style:{color:'#CBD5E1',background:bgColor}},''),
          ce('td',{key:grp.id+i+'q',style:{color:'#CBD5E1',background:bgColor}},''),
        ]).flat();
      });
    }

    // ── Headers ──
    const hdr1 = [
      ce('th',{key:'dim',className:'left',rowSpan:2,style:{minWidth:220,zIndex:3,background:'#E8EAF6',color:'#1A237E'}},'Zone / State / City / Dealer'),
      ce('th',{key:'tot',colSpan:4,style:{background:'#E8EAF6',color:'#1A237E'}},'TOTAL'),
      ...(viewerMode ? [] : srcGroups.map(grp => {
        const exp = expandedGrps.has(grp.id);
        const sgs = grp.subGroups.filter(sg=>sg.srcs.length>0);
        return ce('th',{key:grp.id,colSpan:exp?sgs.length*4:4,
          className:'grp-toggle',style:{background:grp.lightColor||'#F3F4F6',color:grp.color,borderTop:'2px solid '+grp.color},
          onClick:()=>onToggleGrp(grp.id)
        },(exp?'▴ ':'▾ ')+grp.label);
      }))
    ];
    const hdr2 = [
      ce('th',{key:'tl',className:'sub'},'Leads'),ce('th',{key:'tr',className:'sub'},'Retail'),
      ce('th',{key:'tc',className:'sub'},'Contrib%'),ce('th',{key:'tl2r',className:'sub'},'L2R%'),
      ...(viewerMode ? [] : srcGroups.flatMap(grp => {
        const exp = expandedGrps.has(grp.id);
        if (!exp) return [
          ce('th',{key:grp.id+'l',className:'sub',style:{borderLeft:'2px solid '+grp.color+'44'}},'Leads'),
          ce('th',{key:grp.id+'r',className:'sub'},'Retail'),
          ce('th',{key:grp.id+'c',className:'sub'},'Contrib%'),
          ce('th',{key:grp.id+'l2r',className:'sub'},'L2R%'),
        ];
        return grp.subGroups.filter(sg=>sg.srcs.length>0).flatMap((sg,si) => [
          ce('th',{key:sg.id+'l',className:'sub',style:si===0?{borderLeft:'2px solid '+grp.color+'44'}:{},title:sg.label},sg.label+' L'),
          ce('th',{key:sg.id+'r',className:'sub',title:sg.label},sg.label+' R'),
          ce('th',{key:sg.id+'c',className:'sub',title:sg.label},'Contrib%'),
          ce('th',{key:sg.id+'l2r',className:'sub',title:sg.label},'L2R%'),
        ]);
      }))
    ];

    const bodyRows = [];

    // Grand Total
    bodyRows.push(ce('tr',{key:'gtotal',className:'total-row'},
      ce('td',{className:'label',style:{color:'#1A237E'}},'∑ Grand Total'),
      ce('td',null,Nf(gL)),ce('td',{style:{color:'#E31837',fontWeight:700}},Nf(gR)),
      ce('td',null,'100.0%'),ce('td',{style:{color:'#D97706',fontWeight:700}},grand.l2r>0?Pf(grand.l2r):'—'),
      ...(viewerMode ? [] : srcGroups.flatMap(grp=>grpCells(grandSrc,grp)))
    ));

    for (const zone of ZONE_ORDER) {
      const zd = zoneData.get(zone);
      if (!zd || zd.total[0] === 0) continue;
      const zTot = fin(zd.total[0],zd.total[1]);
      const zSrcMap = buildSrcMap(zd.bySrc);
      const isZOpen = openZone === zone;

      // ── Zone row ──
      bodyRows.push(ce('tr',{key:'z_'+zone,className:'section-row',onClick:()=>onClickZone(zone),style:{cursor:'pointer'}},
        ce('td',{className:'label',style:{color:'#0D47A1'}},
          ce('span',{style:{display:'flex',alignItems:'center',gap:6}},
            ce('span',{style:{fontSize:11}},isZOpen?'▾':'▸'),
            zone+' Zone'
          )
        ),
        ce('td',null,Nf(zTot.l)),ce('td',{style:{color:'#1565C0',fontWeight:700}},Nf(zTot.r)),
        ce('td',null,gL>0?Pf(zTot.l/gL*100):'—'),ce('td',{style:{color:'#D97706',fontWeight:700}},zTot.l2r>0?Pf(zTot.l2r):'—'),
        ...(viewerMode ? [] : srcGroups.flatMap(grp=>grpCells(zSrcMap,grp)))
      ));
      if (!isZOpen) continue;

      for (const state of zd.states.sort()) {
        const sd = stateData.get(state);
        if (!sd) continue;
        const sTot = fin(sd.total[0],sd.total[1]);
        const sSrcMap = buildSrcMap(sd.byS);
        const isSOpen = openState === state;

        // ── State row ──
        bodyRows.push(ce('tr',{key:'s_'+state,className:'sub-row',
          onClick:hasCities?()=>onClickState(state):undefined,
          style:{cursor:hasCities?'pointer':'default'}
        },
          ce('td',{className:'sub-label',style:{paddingLeft:28}},
            ce('span',{style:{display:'flex',alignItems:'center',gap:5}},
              hasCities&&ce('span',{style:{fontSize:10,color:'#94A3B8',flexShrink:0}},isSOpen?'▾':'▸'),
              state
            )
          ),
          ce('td',null,Nf(sTot.l)),ce('td',{style:{color:'#E31837',fontWeight:700}},Nf(sTot.r)),
          ce('td',null,gL>0?Pf(sTot.l/gL*100):'—'),ce('td',{style:{color:'#D97706',fontWeight:600}},sTot.l2r>0?Pf(sTot.l2r):'—'),
          ...(viewerMode ? [] : srcGroups.flatMap(grp=>grpCells(sSrcMap,grp)))
        ));
        if (!isSOpen) continue;

        const sortedCities = [...cityData.keys()].sort();
        for (const city of sortedCities) {
          const cv = cityData.get(city);
          const cTot = fin(cv[0],cv[1]);
          const isCOpen = openCity === city;

          // ── City row ──
          bodyRows.push(ce('tr',{key:'c_'+city,className:'city-row',
            onClick:hasDealers?()=>onClickCity(city):undefined,
            style:{cursor:hasDealers?'pointer':'default'}
          },
            ce('td',{className:'label',style:{paddingLeft:48,fontWeight:500,fontSize:11.5,color:'#166534',background:'#F0FDF4',borderRight:'2px solid #BBF7D0'}},
              ce('span',{style:{display:'flex',alignItems:'center',gap:5}},
                hasDealers&&ce('span',{style:{fontSize:10,color:'#86EFAC',flexShrink:0}},isCOpen?'▾':'▸'),
                city
              )
            ),
            ce('td',{style:{background:'#F0FDF4'}},Nf(cTot.l)),
            ce('td',{style:{background:'#F0FDF4',color:'#16A34A',fontWeight:700}},Nf(cTot.r)),
            ce('td',{style:{background:'#F0FDF4'}},gL>0?Pf(cTot.l/gL*100):'—'),
            ce('td',{style:{background:'#F0FDF4',color:'#D97706',fontWeight:600}},cTot.l2r>0?Pf(cTot.l2r):'—'),
            ...(viewerMode ? [] : hasCitySrc
              ? srcGroups.flatMap(grp => grpCells(buildSrcMap(citySourceByS.get(city) || new Map()), grp))
              : blankSrcCells('#F0FDF4'))
          ));
          if (!isCOpen) continue;

          // ── Dealer rows (sorted by leads desc) ──
          const sortedDealers = [...dealerData.keys()].sort((a,b)=>(dealerData.get(b)[0]||0)-(dealerData.get(a)[0]||0));
          for (const dl of sortedDealers) {
            const dv = dealerData.get(dl);
            const dTot = fin(dv[0],dv[1]);
            bodyRows.push(ce('tr',{key:'d_'+dl,className:'dealer-row'},
              ce('td',{className:'label',style:{paddingLeft:68,fontWeight:400,fontSize:11,color:'#64748B',background:'#FAFAFA',borderRight:'2px solid #F1F5F9'}},dl),
              ce('td',{style:{background:'#FAFAFA'}},Nf(dTot.l)),
              ce('td',{style:{background:'#FAFAFA',color:'#0D9488',fontWeight:700}},Nf(dTot.r)),
              ce('td',{style:{background:'#FAFAFA'}},gL>0?Pf(dTot.l/gL*100):'—'),
              ce('td',{style:{background:'#FAFAFA',color:'#D97706',fontWeight:600}},dTot.l2r>0?Pf(dTot.l2r):'—'),
              ...(viewerMode ? [] : hasDealerSrc
                ? srcGroups.flatMap(grp => grpCells(buildSrcMap(dealerSourceByS.get(dl) || new Map()), grp))
                : blankSrcCells('#FAFAFA'))
            ));
          }
        }
      }
    }

    return { grand, hdr1, hdr2, bodyRows };
  }, [stm, cm, cdm, csm_data, cdsm_data, maps, filters, expandedGrps, openZone, openState, openCity, srcGroups, hasCities, hasDealers, hasCitySrc, hasDealerSrc, cityIndexMap, getLR, viewerMode]);

  return ce('div', { className:'fade-up' },

   BUYING INTENT TAB
   ════════════════════════════════════════════════════════════════════ */
const BuyingIntentTab = React.memo(function BuyingIntentTab({ data, filters, months, RT }) {
  const { maps, bdm } = data;
  const getLR = useMemo(() => makeLR(data.rt_cols, RT), [data.rt_cols, RT]);
  const allSrcs = useMemo(() => [...new Set(maps.src)], [maps]);
  const srcGroups = useMemo(() => buildSrcGroups(allSrcs), [allSrcs]);
  const [expandedGrps, setExpandedGrps] = useState(new Set());
  const onToggleGrp = useCallback(id => setExpandedGrps(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  }), []);

  const renderAgg = useCallback((M) => {
    const allS = !filters.sources || filters.sources.size === 0;
    const byBucket = new Map();
    const bySrc = new Map();
    const byBucketSrc = new Map();
    let gL=0,gR=0;
    for (const row of bdm) {
      if (maps.lm[row[2]] !== M) continue;
      const src = maps.src[row[1]];
      if (!allS && !filters.sources.has(src)) continue;
      const bucket = bdBucket(row[0]);
      const [l,r]=getLR(row);
      gL+=l; gR+=r;
      const cb = byBucket.get(bucket)||[0,0]; cb[0]+=l; cb[1]+=r; byBucket.set(bucket,cb);
      const cs = bySrc.get(src)||[0,0]; cs[0]+=l; cs[1]+=r; bySrc.set(src,cs);
      const k=bucket+'\x00'+src;
      const cbs = byBucketSrc.get(k)||[0,0]; cbs[0]+=l; cbs[1]+=r; byBucketSrc.set(k,cbs);
    }
    const grandSrc = {};
    for (const [s,v] of bySrc) grandSrc[s] = fin(v[0],v[1]);
    const dimAggs = {};
    for (const [b,bv] of byBucket) {
      const srcAgg = {};
      for (const s of bySrc.keys()) {
        const v = byBucketSrc.get(b+'\x00'+s);
        srcAgg[s] = v ? fin(v[0],v[1]) : EMPTY;
      }
      dimAggs[b] = { total: fin(bv[0],bv[1]), src: srcAgg };
    }
    // Sort by bucket order
    const orderedDimAggs = {};
    for (const bk of BD_BUCKETS) if (dimAggs[bk]) orderedDimAggs[bk] = dimAggs[bk];
    return { grand: fin(gL,gR), grandSrc, dimAggs: orderedDimAggs };
  }, [bdm, maps, filters, getLR]);

  // Override DimGrid sort (buckets should follow BD_BUCKETS order, not desc leads)
  const renderAggWithOrder = useCallback((M) => {
    const agg = renderAgg(M);
    if (!agg) return null;
    // DimGrid sorts by l desc — we want bucket order. Inject rank prefix
    const orderedDimAggs = {};
    BD_BUCKETS.forEach((bk, i) => {
      if (agg.dimAggs[bk]) orderedDimAggs['\x00'+i+bk] = agg.dimAggs[bk];
    });
    return { ...agg, dimAggs: orderedDimAggs, _labels: (k => k.replace(/^\x00\d/, '')) };
  }, [renderAgg]);

  // Custom render: preserve bucket order (0–7 first, 90+ last) via noSort
  return ce('div', { className:'fade-up' },
    months.map(M => {
      const agg = renderAgg(M);
      if (!agg || agg.grand.l === 0) return null;
      // Rebuild dimAggs in canonical bucket order so noSort preserves it
      const orderedAgg = { ...agg, dimAggs: {} };
      BD_BUCKETS.forEach(bk => { if (agg.dimAggs[bk]) orderedAgg.dimAggs[bk + ' days'] = agg.dimAggs[bk]; });

      return ce('div', { key:M, className:'card', style:{padding:'16px 18px',marginBottom:14} },
        ce('div', { className:'section-title', style:{marginBottom:10} }, 'Buying Intent — ' + M),
        ce(DimGrid, { agg: orderedAgg, srcGroups, dimLabel:'Intent (Days)', expandedGrps, onToggleGrp, noSort: true })
      );
    })
  );
});

/* ════════════════════════════════════════════════════════════════════
   APP ROOT
   ════════════════════════════════════════════════════════════════════ */
const TABS = [
  { id:'overview',  label:'Overview' },
  { id:'source',    label:'Source Analysis' },
  { id:'ltxsrc',   label:'LT × Source' },
  { id:'modelxsrc',label:'Model × Source' },
  { id:'statexsrc',label:'State × Source' },
  { id:'buying',   label:'Buying Intent' },
];

function App() {
  // ── Auth state (must be before any early returns) ──────────────────
  const [auth, setAuth]           = useState(() => {
    try { const s = sessionStorage.getItem(AUTH_SESSION_KEY); return s ? JSON.parse(s) : null; }
    catch(e) { return null; }
  });
  const [authChecking, setAuthChecking] = useState(!!auth); // verify cached session

  // ── Dashboard state ────────────────────────────────────────────────
  const [tab, setTab]             = useState(() => auth && auth.role === 'viewer' ? 'modelxsrc' : 'overview');
  const [data, setData]           = useState(null);
  const [loading, setLoading]     = useState(false);
  const [err, setErr]             = useState(null);
  const [isPending, startT]       = useTransition();
  const [leadsMode, setLeadsMode] = useState('create');
  const [RT, setRT]               = useState('all');
  const [filters, setFilters]     = useState({ months:new Set(), leadTypes:new Set(), sources:new Set(), models:new Set(), states:new Set(), cities:new Set() });

  // ── Auth helpers ───────────────────────────────────────────────────
  const handleLogin = useCallback((email, name, role) => {
    const a = { email, name, role };
    setAuth(a);
    if (role === 'admin' || role === 'full' || role === 'viewer') {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(a)); } catch(e) {}
    } else {
      try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch(e) {}
    }
    setTab(role === 'viewer' ? 'modelxsrc' : 'overview');
  }, []);

  const handleLogout = useCallback(() => {
    try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch(e) {}
    setAuth(null);
  }, []);

  // Verify cached session is still valid
  useEffect(() => {
    if (!auth) return;
    apiFetchRole(auth.email)
      .then(res => {
        if (res.role !== auth.role) {
          const updated = { ...auth, role: res.role };
          setAuth(updated);
          try { sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(updated)); } catch(e) {}
          if (res.role === 'viewer') setTab('modelxsrc');
        }
      })
      .catch(() => {})
      .finally(() => setAuthChecking(false));
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // ── Data fetching ──────────────────────────────────────────────────
  const doFetch = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const parsed = await fetchData();
      setData(parsed);
      try { localStorage.setItem(CACHE_KEY+'_t', parsed.t); } catch(e) {}
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (auth && (auth.role === 'full' || auth.role === 'viewer')) doFetch(); }, [auth && auth.role]);

  // ── Derived data ───────────────────────────────────────────────────
  const effectiveData = useMemo(() => {
    if (!data) return null;
    if (leadsMode === 'create' || !data.u_monthly) return data;
    return {
      ...data,
      monthly: data.u_monthly, sm: data.u_sm, ltm: data.u_ltm,
      mm: data.u_mm, stm: data.u_stm, zm: data.u_zm, bdm: data.u_bdm,
      maps: { ...data.maps, lm: data.maps.u_lm },
    };
  }, [data, leadsMode]);

  const months = useMemo(() => {
    if (!effectiveData) return [];
    const allM = [...new Set(effectiveData.maps.lm)].sort((a,b) => monthOrder(b)-monthOrder(a));
    if (!filters.months || filters.months.size === 0) return allM;
    return allM.filter(m => filters.months.has(m));
  }, [effectiveData, filters.months]);

  const role       = auth ? auth.role : null;
  const viewerMode = role === 'viewer';
  const visibleTabs = viewerMode
    ? TABS.filter(t => t.id === 'modelxsrc' || t.id === 'statexsrc')
    : TABS;

  const tabContent = useMemo(() => {
    if (!effectiveData) return null;
    const props = { data: effectiveData, filters, months, RT, viewerMode };
    switch (tab) {
      case 'overview':  return ce(OverviewTab,    props);
      case 'source':    return ce(SourceTab,       props);
      case 'ltxsrc':   return ce(LTSourceTab,      props);
      case 'modelxsrc':return ce(ModelSourceTab,   props);
      case 'statexsrc':return ce(StateSourceTab,   props);
      case 'buying':   return ce(BuyingIntentTab,  props);
      default: return null;
    }
  }, [effectiveData, tab, filters, months, RT, viewerMode]);

  // ── Auth gate — early returns after all hooks ──────────────────────
  if (authChecking) return ce('div', {
    style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',
      background:'linear-gradient(135deg,#001F5B,#B01229)'}
  }, ce('div', { className:'spinner', style:{width:36,height:36,borderWidth:3,borderColor:'rgba(255,255,255,.3)',borderTopColor:'#fff'} }));

  if (!auth)                    return ce(LoginScreen,         { onLogin: handleLogin });
  if (role === 'pending')       return ce(PendingScreen,       { email:auth.email, onRefresh: r => handleLogin(auth.email, auth.name||'', r), onBack: handleLogout });
  if (role === 'restricted')    return ce(RestrictedScreen,    { onBack: handleLogout });
  if (role === 'none')          return ce(RequestAccessScreen, { email:auth.email, onLogin:(e,n,r)=>handleLogin(e,n,r), onBack: handleLogout });
  if (role === 'admin')         return ce(AdminPanel,          { auth, onLogout: handleLogout });

  // ── Dashboard (full / viewer) ──────────────────────────────────────
  const syncChip = data && ce('div', {
    style:{fontSize:10,color:'#64748B',background:'#F0F4FF',padding:'2px 10px',borderRadius:20,fontFamily:'DM Mono'}
  }, 'Synced: ' + (data.t ? new Date(data.t).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'));

  const userChip = ce('div', { className:'user-chip' },
    ce('div', { className:'user-avatar' }, auth.email[0].toUpperCase()),
    ce('span', { className:'user-name' }, auth.name || auth.email),
    ce('span', { className:'user-role-badge ' + (viewerMode ? 'role-viewer' : 'role-full') },
      viewerMode ? 'Viewer' : 'Full'),
  );

  return ce('div', { style:{minHeight:'100vh',background:'#f8fafc'} },

    // ── Header ──
    ce('div', { style:{background:'#fff',borderBottom:'1px solid #E2E8F0',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
      ce('div', { style:{maxWidth:1440,margin:'0 auto',padding:'0 20px'} },
        ce('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F1F5F9'} },
          ce('div', { style:{display:'flex',alignItems:'center',gap:12} },
            ce('div', { style:{display:'flex',alignItems:'center',gap:8} },
              ce('div', { style:{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#B01229,#E31837)',display:'flex',alignItems:'center',justifyContent:'center'} },
                ce('span', { style:{fontSize:14,fontWeight:900,color:'#fff',fontFamily:'DM Mono,monospace',letterSpacing:'-.04em'} }, 'TVS')
              ),
              ce('div', null,
                ce('div', { style:{fontSize:13,fontWeight:800,color:'#0f172a',letterSpacing:'-.03em',lineHeight:1.1} }, 'TVS Motor Company'),
                ce('div', { style:{fontSize:10,color:'#E31837',fontWeight:600} }, 'Lead Disposition Dashboard v2.0'),
              )
            ),
            ce('div', { style:{width:1,height:28,background:'#E2E8F0'} }),
            syncChip,
          ),
          ce('div', { style:{display:'flex',gap:8,alignItems:'center'} },
            ce('div', { style:{display:'flex',alignItems:'center',background:'#F1F5F9',borderRadius:20,padding:'2px',border:'1px solid #E2E8F0',gap:2} },
              ce('button', {
                onClick:()=>setLeadsMode('create'),
                style:{padding:'4px 12px',fontSize:10,fontWeight:700,fontFamily:'inherit',border:'none',borderRadius:18,cursor:'pointer',transition:'all 120ms',
                  background:leadsMode==='create'?'#003087':'transparent',color:leadsMode==='create'?'#fff':'#64748B'}
              }, 'On Create'),
              ce('button', {
                onClick:()=>setLeadsMode('update'),
                style:{padding:'4px 12px',fontSize:10,fontWeight:700,fontFamily:'inherit',border:'none',borderRadius:18,cursor:'pointer',transition:'all 120ms',
                  background:leadsMode==='update'?'#003087':'transparent',color:leadsMode==='update'?'#fff':'#64748B'}
              }, 'On Update'),
            ),
            loading && ce('div', { className:'spinner' }),
            ce('button', { className:'btn btn-secondary', style:{fontSize:11}, onClick:doFetch }, '⟳ Refresh'),
            userChip,
            ce('button', { className:'btn-ghost', style:{fontSize:11,color:'#64748B'}, onClick:handleLogout }, 'Sign Out'),
          )
        ),
        ce('div', { style:{display:'flex',overflowX:'auto',gap:0} },
          visibleTabs.map(t => ce('button', {
            key: t.id,
            className: 'tab-pill' + (tab === t.id ? ' active' : ''),
            onClick: () => startT(() => setTab(t.id))
          }, t.label))
        )
      )
    ),

    // ── Main ──
    ce('div', { style:{maxWidth:1440,margin:'0 auto',padding:'20px'} },
      err && ce('div', { className:'err-box', style:{marginBottom:14} }, '⚠ ' + err),
      !effectiveData && !loading && ce('div', { style:{textAlign:'center',padding:60,color:'#94A3B8',fontSize:14} },
        ce('div', { style:{fontSize:32,marginBottom:12} }, '📂'),
        'No data loaded. ',
        ce('button', { onClick:doFetch, style:{color:'#E31837',textDecoration:'underline',background:'none',border:'none',cursor:'pointer',fontSize:'inherit'} }, 'Click to fetch'),
      ),
      loading && !effectiveData && ce('div', { style:{textAlign:'center',padding:60} },
        ce('div', { className:'spinner', style:{width:36,height:36,borderWidth:3,margin:'0 auto 16px'} }),
        ce('div', { style:{color:'#64748B',fontSize:13} }, 'Fetching data from Apps Script…')
      ),
      effectiveData && ce('div', null,
        ce(FilterBar, { data:effectiveData, filters, onFiltersChange:f=>startT(()=>setFilters(f)), RT, setRT, viewerMode }),
        filters.cities && filters.cities.size > 0 && tab !== 'overview' && ce('div', {
          style:{fontSize:10,color:'#92400E',background:'#FFF3CD',border:'1px solid #F5A623',borderRadius:8,padding:'5px 12px',marginBottom:8}
        }, '⚠ City filter is active — KPIs and trend chart reflect selected cities only.'),
        isPending && ce('div', { style:{textAlign:'center',padding:8,color:'#94A3B8',fontSize:11} }, 'Filtering…'),
        tabContent
      )
    )
  );
}

/* ════════════════════════════════════════════════════════════════════
   BOOTSTRAP
   ════════════════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(ce(App));
</script>
</body>
</html>
