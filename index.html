/* ════════════════════════════════════════════════════════════════════
   APP ROOT
   ════════════════════════════════════════════════════════════════════ */
const TABS = [
  { id:'overview',  label:'Overview' },
  { id:'source',    label:'Source Analysis' },
  { id:'ltxsrc',   label:'LT × Source' },
  { id:'modelxsrc',label:'Model × Source' },
  { id:'statexsrc',  label:'State × Source' },
  { id:'dispersion', label:'Retail Dispersion' },
  { id:'pivot',      label:'Pivot Table'       },
];

function App() {
  // ── Auth state (must be before any early returns) ──────────────────
  const [auth, setAuth]           = useState(() => {
    try { const s = sessionStorage.getItem(AUTH_SESSION_KEY); return s ? JSON.parse(s) : null; }
    catch(e) { return null; }
  });
  const [authChecking, setAuthChecking] = useState(!!auth); // verify cached session

  // ── Dashboard state ────────────────────────────────────────────────
  const [adminView, setAdminView] = useState(false);
  const [tab, setTab]             = useState(() => auth && auth.role === 'viewer' ? 'modelxsrc' : 'overview');
  const [data, setData]           = useState(null);
  const [loading, setLoading]     = useState(false);
  const [err, setErr]             = useState(null);
  const [isPending, startT]       = useTransition();
  const [leadsMode, setLeadsMode] = useState('create');
  const [RT, setRT]               = useState('all');
  const [filters, setFilters]     = useState({ months:new Set(), leadTypes:new Set(), sources:new Set(), models:new Set(), states:new Set(), cities:new Set() });

  // ── Auth helpers ───────────────────────────────────────────────────
  const handleLogin = useCallback((email, name, role) => {
    const a = { email, name, role };
    setAuth(a);
    if (role === 'admin' || role === 'full' || role === 'viewer') {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(a)); } catch(e) {}
    } else {
      try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch(e) {}
    }
    setTab(role === 'viewer' ? 'modelxsrc' : 'overview');
  }, []);

  const handleLogout = useCallback(() => {
    try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch(e) {}
    setAuth(null);
  }, []);

  // Verify cached session is still valid
  useEffect(() => {
    if (!auth) return;
    apiFetchRole(auth.email)
      .then(res => {
        if (res.role !== auth.role) {
          const updated = { ...auth, role: res.role };
          setAuth(updated);
          try { sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(updated)); } catch(e) {}
          if (res.role === 'viewer') setTab('modelxsrc');
        }
      })
      .catch(() => {})
      .finally(() => setAuthChecking(false));
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // ── Data fetching ──────────────────────────────────────────────────
  const doFetch = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const parsed = await fetchData();
      setData(parsed);
      try { localStorage.setItem(CACHE_KEY+'_t', parsed.t); } catch(e) {}
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (auth && (auth.role === 'full' || auth.role === 'viewer' || auth.role === 'admin')) doFetch(); }, [auth && auth.role]);

  // ── Derived data ───────────────────────────────────────────────────
  const effectiveData = useMemo(() => {
    if (!data) return null;
    if (leadsMode === 'create' || !data.u_monthly) return data;
    return {
      ...data,
      monthly: data.u_monthly, sm: data.u_sm, ltm: data.u_ltm,
      mm: data.u_mm, stm: data.u_stm, zm: data.u_zm, bdm: data.u_bdm,
      mxst: data.u_mxst, mlt: data.u_mlt, stlt: data.u_stlt, disp: data.u_disp,
      maps: { ...data.maps, lm: data.maps.u_lm },
    };
  }, [data, leadsMode]);

  const months = useMemo(() => {
    if (!effectiveData) return [];
    const allM = [...new Set(effectiveData.maps.lm)].sort((a,b) => monthOrder(b)-monthOrder(a));
    if (!filters.months || filters.months.size === 0) return allM;
    return allM.filter(m => filters.months.has(m));
  }, [effectiveData, filters.months]);

  const role       = auth ? auth.role : null;
  const viewerMode = role === 'viewer';
  const visibleTabs = viewerMode
    ? TABS.filter(t => t.id === 'modelxsrc' || t.id === 'statexsrc')
    : TABS;

  const tabContent = useMemo(() => {
    if (!effectiveData) return null;
    const props = { data: effectiveData, filters, months, RT, viewerMode };
    switch (tab) {
      case 'overview':  return ce(OverviewTab,    props);
      case 'source':    return ce(SourceTab,       props);
      case 'ltxsrc':   return ce(LTSourceTab,      props);
      case 'modelxsrc':return ce(ModelSourceTab,   props);
      case 'statexsrc':  return ce(StateSourceTab,   props);
      case 'dispersion': return ce(DispersionTab,    props);
      case 'pivot':      return ce(PivotTab,         props);
      default: return null;
    }
  }, [effectiveData, tab, filters, months, RT, viewerMode]);

  // ── Auth gate — early returns after all hooks ──────────────────────
  if (authChecking) return ce('div', {
    style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',
      background:'linear-gradient(135deg,#001F5B,#B01229)'}
  }, ce('div', { className:'spinner', style:{width:36,height:36,borderWidth:3,borderColor:'rgba(255,255,255,.3)',borderTopColor:'#fff'} }));

  if (!auth)                    return ce(LoginScreen,         { onLogin: handleLogin });
  if (role === 'pending')       return ce(PendingScreen,       { email:auth.email, onRefresh: r => handleLogin(auth.email, auth.name||'', r), onBack: handleLogout });
  if (role === 'restricted')    return ce(RestrictedScreen,    { onBack: handleLogout });
  if (role === 'none')          return ce(RequestAccessScreen, { email:auth.email, onLogin:(e,n,r)=>handleLogin(e,n,r), onBack: handleLogout });
  if (role === 'admin' && adminView) return ce(AdminPanel, { auth, onLogout: handleLogout, onViewDashboard: () => setAdminView(false) });

  // ── Dashboard (full / viewer) ──────────────────────────────────────
  const syncChip = data && ce('div', {
    style:{fontSize:10,color:'#64748B',background:'#F0F4FF',padding:'2px 10px',borderRadius:20,fontFamily:'DM Mono'}
  }, 'Synced: ' + (data.t ? new Date(data.t).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'));

  const userChip = ce('div', { className:'user-chip' },
    ce('div', { className:'user-avatar' }, auth.email[0].toUpperCase()),
    ce('span', { className:'user-name' }, auth.name || auth.email),
    ce('span', { className:'user-role-badge ' + (viewerMode ? 'role-viewer' : 'role-full') },
      viewerMode ? 'Viewer' : 'Full'),
  );

  return ce('div', { style:{minHeight:'100vh',background:'#f8fafc'} },

    // ── Header ──
    ce('div', { style:{background:'#fff',borderBottom:'1px solid #E2E8F0',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
      ce('div', { style:{maxWidth:1440,margin:'0 auto',padding:'0 20px'} },
        ce('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F1F5F9'} },
          ce('div', { style:{display:'flex',alignItems:'center',gap:12} },
            ce('div', { style:{display:'flex',alignItems:'center',gap:8} },
              ce('div', { style:{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#B01229,#E31837)',display:'flex',alignItems:'center',justifyContent:'center'} },
                ce('span', { style:{fontSize:14,fontWeight:900,color:'#fff',fontFamily:'DM Mono,monospace',letterSpacing:'-.04em'} }, 'TVS')
              ),
              ce('div', null,
                ce('div', { style:{fontSize:13,fontWeight:800,color:'#0f172a',letterSpacing:'-.03em',lineHeight:1.1} }, 'TVS Motor Company'),
                ce('div', { style:{fontSize:10,color:'#E31837',fontWeight:600} }, 'Lead Disposition Dashboard v2.0'),
              )
            ),
            ce('div', { style:{width:1,height:28,background:'#E2E8F0'} }),
            syncChip,
          ),
          ce('div', { style:{display:'flex',gap:8,alignItems:'center'} },
            ce('div', { style:{display:'flex',alignItems:'center',background:'#F1F5F9',borderRadius:20,padding:'2px',border:'1px solid #E2E8F0',gap:2} },
              ce('button', {
                onClick:()=>setLeadsMode('create'),
                style:{padding:'4px 12px',fontSize:10,fontWeight:700,fontFamily:'inherit',border:'none',borderRadius:18,cursor:'pointer',transition:'all 120ms',
                  background:leadsMode==='create'?'#003087':'transparent',color:leadsMode==='create'?'#fff':'#64748B'}
              }, 'On Create'),
              ce('button', {
                onClick:()=>setLeadsMode('update'),
                style:{padding:'4px 12px',fontSize:10,fontWeight:700,fontFamily:'inherit',border:'none',borderRadius:18,cursor:'pointer',transition:'all 120ms',
                  background:leadsMode==='update'?'#003087':'transparent',color:leadsMode==='update'?'#fff':'#64748B'}
              }, 'On Update'),
            ),
            loading && ce('div', { className:'spinner' }),
            ce('button', { className:'btn btn-secondary', style:{fontSize:11}, onClick:doFetch }, '⟳ Refresh'),
            role === 'admin' && ce('button', { className:'btn btn-secondary', style:{fontSize:11}, onClick:() => setAdminView(true) }, '⚙ Admin Panel'),
            userChip,
            ce('button', { className:'btn-ghost', style:{fontSize:11,color:'#64748B'}, onClick:handleLogout }, 'Sign Out'),
          )
        ),
        ce('div', { style:{display:'flex',overflowX:'auto',gap:0} },
          visibleTabs.map(t => ce('button', {
            key: t.id,
            className: 'tab-pill' + (tab === t.id ? ' active' : ''),
            onClick: () => startT(() => setTab(t.id))
          }, t.label))
        )
      )
    ),

    // ── Main ──
    ce('div', { style:{maxWidth:1440,margin:'0 auto',padding:'20px'} },
      err && ce('div', { className:'err-box', style:{marginBottom:14} }, '⚠ ' + err),
      !effectiveData && !loading && ce('div', { style:{textAlign:'center',padding:60,color:'#94A3B8',fontSize:14} },
        ce('div', { style:{fontSize:32,marginBottom:12} }, '📂'),
        'No data loaded. ',
        ce('button', { onClick:doFetch, style:{color:'#E31837',textDecoration:'underline',background:'none',border:'none',cursor:'pointer',fontSize:'inherit'} }, 'Click to fetch'),
      ),
      loading && !effectiveData && ce('div', { style:{textAlign:'center',padding:60} },
        ce('div', { className:'spinner', style:{width:36,height:36,borderWidth:3,margin:'0 auto 16px'} }),
        ce('div', { style:{color:'#64748B',fontSize:13} }, 'Fetching data from Apps Script…')
      ),
      effectiveData && ce('div', null,
        ce(FilterBar, { data:effectiveData, filters, onFiltersChange:f=>startT(()=>setFilters(f)), RT, setRT, viewerMode }),
        filters.cities && filters.cities.size > 0 && tab !== 'overview' && ce('div', {
          style:{fontSize:10,color:'#92400E',background:'#FFF3CD',border:'1px solid #F5A623',borderRadius:8,padding:'5px 12px',marginBottom:8}
        }, '⚠ City filter is active — KPIs and trend chart reflect selected cities only.'),
        isPending && ce('div', { style:{textAlign:'center',padding:8,color:'#94A3B8',fontSize:11} }, 'Filtering…'),
        tabContent
      )
    )
  );
}

/* ════════════════════════════════════════════════════════════════════
   RETAIL DISPERSION TAB
   ════════════════════════════════════════════════════════════════════ */
const DispersionTab = React.memo(function DispersionTab({ data, filters, months, RT }) {
  const { maps, disp } = data;

  // group by retail-attribution month → enquired_model_idx → purchased_model_idx → count
  const byMonth = useMemo(() => {
    const rows = disp || [];
    const allM   = !filters.months || filters.months.size === 0;
    const allMdl = !filters.models || filters.models.size === 0;
    const allSt  = !filters.states || filters.states.size === 0;

    const map = new Map(); // month → Map(ei → Map(pi → count))
    for (const row of rows) {
      const ei = row[0], pi = row[1], lmi = row[2], cnt = row[3];
      const m   = maps.lm[lmi];
      const mdl = maps.mdl[ei];
      if (!allM   && !filters.months.has(m))   continue;
      if (!allMdl && !filters.models.has(mdl)) continue;
      // state filter doesn't apply here (no state dim in disp)
      if (!map.has(m)) map.set(m, new Map());
      const mMap = map.get(m);
      if (!mMap.has(ei)) mMap.set(ei, new Map());
      const eMap = mMap.get(ei);
      eMap.set(pi, (eMap.get(pi) || 0) + cnt);
    }
    return map;
  }, [disp, maps, filters]);

  const sortedMonths = useMemo(() =>
    [...byMonth.keys()].sort((a,b) => monthOrder(b) - monthOrder(a)),
  [byMonth]);

  if (!disp || disp.length === 0) return ce('div', {
    style:{textAlign:'center',padding:60,color:'#94A3B8',fontSize:14}
  }, ce('div',{style:{fontSize:32,marginBottom:12}},'📊'), 'Dispersion data will appear after the next pipeline run.');

  const DISP_BAR = (pct) => {
    const w = Math.min(100, pct);
    const col = pct >= 80 ? '#DC2626' : pct >= 60 ? '#E31837' : pct >= 40 ? '#F97316' : '#F5A623';
    return ce('div', { style:{display:'flex',alignItems:'center',gap:6} },
      ce('div', { style:{flex:'0 0 80px',height:8,borderRadius:4,background:'#F1F5F9',overflow:'hidden'} },
        ce('div', { style:{width:w+'%',height:'100%',background:col,borderRadius:4,transition:'width 300ms'} })
      ),
      ce('span', { style:{fontSize:11,fontWeight:700,color:col,minWidth:36} }, pct.toFixed(0)+'%')
    );
  };

  const renderMonthGrid = (M) => {
    const mMap = byMonth.get(M);
    if (!mMap) return null;

    // build rows: [enquired_model, same, cross, total, dispersion%]
    const tableRows = [];
    for (const [ei, piMap] of mMap.entries()) {
      const enquiredMdl = maps.mdl[ei];
      let same = 0, cross = 0;
      for (const [pi, cnt] of piMap.entries()) {
        const purchasedMdl = maps.mdl[pi];
        if (purchasedMdl === enquiredMdl) same += cnt;
        else cross += cnt;
      }
      const total = same + cross;
      if (total === 0) continue;
      tableRows.push({ enquiredMdl, same, cross, total, disp: cross / total * 100 });
    }
    tableRows.sort((a,b) => b.total - a.total);

    const totSame  = tableRows.reduce((s,r) => s+r.same, 0);
    const totCross = tableRows.reduce((s,r) => s+r.cross, 0);
    const totTotal = totSame + totCross;
    const totDisp  = totTotal > 0 ? totCross / totTotal * 100 : 0;

    const exportData = () => {
      const aoa = [['Enquired Model','Same','Cross','Total','Dispersion%']];
      for (const r of tableRows) aoa.push([r.enquiredMdl, r.same, r.cross, r.total, +r.disp.toFixed(1)]);
      aoa.push(['∑ Total', totSame, totCross, totTotal, +totDisp.toFixed(1)]);
      exportXlsx({ [M]: aoa }, 'TVS_Dispersion_'+M.replace("'",""));
    };

    return ce('div', { key:M, className:'card', style:{padding:'16px 18px',marginBottom:14} },
      ce('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8} },
        ce('div', { style:{display:'flex',alignItems:'center',gap:10} },
          ce('div', { className:'section-title', style:{marginBottom:0} }, M),
          ce('span', { style:{fontSize:11,color:'#64748B',fontWeight:500} },
            Nf(totTotal)+' retails · '+(totDisp.toFixed(1))+'% cross-sell')
        ),
        ce(ExportBtn, { onClick: exportData })
      ),
      ce('div', { className:'scroll-x' },
        ce('table', null,
          ce('thead', null, ce('tr', null,
            ce('th', { className:'left', style:{minWidth:170} }, 'ENQUIRED MODEL'),
            ce('th', { style:{color:'#059669'} }, 'SAME ✓'),
            ce('th', { style:{color:'#E31837'} }, 'CROSS ✗'),
            ce('th', null, 'TOTAL'),
            ce('th', { style:{minWidth:150} }, 'DISPERSION%'),
          )),
          ce('tbody', null,
            ...tableRows.map((r,i) => ce('tr', { key:i },
              ce('td', { className:'label' }, r.enquiredMdl),
              ce('td', { style:{color:'#059669',fontWeight:700} }, Nf(r.same)),
              ce('td', { style:{color:'#E31837',fontWeight:700} }, Nf(r.cross)),
              ce('td', null, Nf(r.total)),
              ce('td', null, DISP_BAR(r.disp)),
            )),
            ce('tr', { className:'total-row' },
              ce('td', { className:'label' }, '∑ Grand Total'),
              ce('td', { style:{color:'#059669',fontWeight:700} }, Nf(totSame)),
              ce('td', { style:{color:'#E31837',fontWeight:700} }, Nf(totCross)),
              ce('td', null, Nf(totTotal)),
              ce('td', null, DISP_BAR(totDisp)),
            )
          )
        )
      )
    );
  };

  return ce('div', { className:'fade-up' },
    ce('div', { style:{fontSize:12,color:'#64748B',marginBottom:14,padding:'8px 12px',background:'#F8FAFC',borderRadius:8,border:'1px solid #E2E8F0'} },
      '📌 Retail Attribution leads only. Shows % of customers who purchased a different model than enquired. Month & Model filters apply.'
    ),
    ...sortedMonths.map(M => renderMonthGrid(M))
  );
});

/* ════════════════════════════════════════════════════════════════════
   PIVOT TABLE TAB
   ════════════════════════════════════════════════════════════════════ */
const COL_SEP = '\x00'; // null-char composite column key separator

const PivotTab = React.memo(function PivotTab({ data, filters, months, RT }) {
  const { maps } = data;

  const [rowDims,    setRowDims]    = useState(['mdl']);
  const [colDims,    setColDims]    = useState(['lm']);
  const [metrics,    setMetrics]    = useState(['leads']);
  const [sortBy,     setSortBy]     = useState('__total__');
  const [sortDir,    setSortDir]    = useState('desc');
  const [topN,       setTopN]       = useState(20);
  const [collapsed,  setCollapsed]  = useState(new Set());
  const [addRowOpen, setAddRowOpen] = useState(false);
  const [addColOpen, setAddColOpen] = useState(false);

  const DIMS = useMemo(() => [
    { key:'lm',  label:'Month'     },
    { key:'mdl', label:'Model'     },
    { key:'src', label:'Source'    },
    { key:'st',  label:'State'     },
    { key:'lt',  label:'Lead Type' },
    { key:'city',label:'City'      },
    ...(maps.dl ? [{ key:'dl', label:'Dealer' }] : []),
  ], [maps.dl]);

  const METRICS = [
    { key:'leads',  label:'Leads'     },
    { key:'ret',    label:'Retails'   },
    { key:'retpct', label:'Retail %'  },
    { key:'dms',    label:'DMS'       },
    { key:'call',   label:'Call-Out'  },
  ];

  const ALL_MATS = [
    { key:'sm',   dims:['src','lm']             },
    { key:'mm',   dims:['mdl','src','lm']        },
    { key:'stm',  dims:['st','src','lm']         },
    { key:'ltm',  dims:['lt','src','lm']         },
    { key:'mxst', dims:['mdl','st','lm']         },
    { key:'mlt',  dims:['mdl','lt','lm']         },
    { key:'stlt', dims:['st','lt','lm']          },
    { key:'cm',   dims:['city','lm']             },
    { key:'csm',  dims:['city','src','lm']       },
    { key:'cdm',  dims:['city','dl','lm']        },
    { key:'cdsm', dims:['city','dl','src','lm']  },
    { key:'stcm', dims:['st','city','lm']        },
  ];

  const matConfig = useMemo(() => {
    const needed = [...rowDims, ...colDims];
    if (new Set(needed).size < needed.length) return null; // any dim repeated
    let best = null, bestExtra = 99;
    for (const m of ALL_MATS) {
      if (!needed.every(d => m.dims.includes(d))) continue;
      const extra = m.dims.filter(d => !needed.includes(d) && d !== 'lm').length;
      if (extra < bestExtra || (extra === bestExtra && m.dims.length < (best?.dims.length ?? 99))) {
        bestExtra = extra; best = m;
      }
    }
    return best;
  }, [rowDims, colDims]);

  const rawMatrix = useMemo(() => {
    if (!matConfig) return [];
    return data[matConfig.key] || [];
  }, [data, matConfig]);

  const filterSets = useMemo(() => {
    if (!matConfig) return {};
    const { dims } = matConfig;
    const mk = (dim, fSet, arr) => {
      if (!dims.includes(dim) || !fSet || fSet.size === 0) return null;
      const s = new Set();
      (arr || []).forEach((v, i) => { if (fSet.has(v)) s.add(i); });
      return s.size ? s : null;
    };
    const sets = {};
    const a = mk('lm',  filters.months,  maps.lm);  if (a) sets.lm  = a;
    const b = mk('src', filters.sources, maps.src); if (b) sets.src = b;
    const c = mk('st',  filters.states,  maps.st);  if (c) sets.st  = c;
    const d = mk('mdl', filters.models,  maps.mdl); if (d) sets.mdl = d;
    if (dims.includes('city') && filters.cities?.size > 0) {
      const cs = new Set();
      (maps.city || []).forEach((v, i) => { if (filters.cities.has(v)) cs.add(i); });
      if (cs.size) sets.city = cs;
    }
    return sets;
  }, [matConfig, filters, maps]);

  function getMetricVal(vals, m) {
    if (!vals) return 0;
    if (m === 'leads')  return vals[0] || 0;
    if (m === 'ret')    return vals[1] || 0;
    if (m === 'retpct') return vals[0] > 0 ? (vals[1] / vals[0]) * 100 : 0;
    if (m === 'dms')    return vals[2] || 0;
    if (m === 'call')   return vals[3] || 0;
    return 0;
  }

  function fmtV(vals, m) {
    const v = getMetricVal(vals, m);
    if (m === 'retpct') return v > 0 ? v.toFixed(1) + '%' : '—';
    return v === 0 ? '—' : v.toLocaleString();
  }

  function rowTotal(cMap, m) {
    let tl = 0, tr = 0;
    for (const v of cMap.values()) { tl += v[0]; tr += v[1]; }
    if (m === 'retpct') return tl > 0 ? (tr / tl) * 100 : 0;
    let t = 0;
    for (const v of cMap.values()) t += getMetricVal(v, m);
    return t;
  }

  function fmtTotal(cMap, m) {
    const v = rowTotal(cMap, m);
    if (m === 'retpct') return v > 0 ? v.toFixed(1) + '%' : '—';
    return v === 0 ? '—' : v.toLocaleString();
  }

  function accVals(tgt, cKey, row, nDims) {
    if (!tgt.has(cKey)) tgt.set(cKey, [0, 0, 0, 0]);
    const c = tgt.get(cKey);
    c[0] += row[nDims]     || 0;
    c[1] += row[nDims + 1] || 0;
    c[2] += row[nDims + 2] || 0;
    c[3] += row[nDims + 3] || 0;
  }

  // tbl: Map<r1Label, { sub: Map<cKey,vals>, children: Map<r2Label, Map<cKey,vals>> }>
  // cKey is colDims[0] label when 1 col dim, or "c0\x00c1" when 2 col dims
  const pivotResult = useMemo(() => {
    if (!matConfig || rawMatrix.length === 0) return null;
    const { dims } = matConfig;
    const nDims = dims.length;
    const rPos0 = dims.indexOf(rowDims[0]);
    const rPos1 = rowDims[1] ? dims.indexOf(rowDims[1]) : -1;
    const cPos0 = dims.indexOf(colDims[0]);
    const cPos1 = colDims[1] ? dims.indexOf(colDims[1]) : -1;
    const lbl   = (dim, idx) => (maps[dim] || [])[idx] ?? '#' + idx;

    const tbl    = new Map();
    const colSet = new Set();

    for (const row of rawMatrix) {
      let ok = true;
      for (const [dim, allowed] of Object.entries(filterSets)) {
        const pos = dims.indexOf(dim);
        if (pos < 0) continue;
        if (!allowed.has(row[pos])) { ok = false; break; }
      }
      if (!ok) continue;

      const r1 = lbl(rowDims[0], row[rPos0]);
      const r2 = rPos1 >= 0 ? lbl(rowDims[1], row[rPos1]) : null;
      const c0 = lbl(colDims[0], row[cPos0]);
      const ck = cPos1 >= 0 ? c0 + COL_SEP + lbl(colDims[1], row[cPos1]) : c0;
      colSet.add(ck);

      if (!tbl.has(r1)) tbl.set(r1, { sub: new Map(), children: new Map() });
      const e = tbl.get(r1);
      accVals(e.sub, ck, row, nDims);
      if (r2 !== null) {
        if (!e.children.has(r2)) e.children.set(r2, new Map());
        accVals(e.children.get(r2), ck, row, nDims);
      }
    }
    return { tbl, colLabels: [...colSet] };
  }, [rawMatrix, matConfig, rowDims, colDims, filterSets, maps]);

  const pm = metrics[0] || 'leads'; // primary metric drives column ordering + sorting

  const orderedCols = useMemo(() => {
    if (!pivotResult) return [];
    const { tbl, colLabels } = pivotResult;

    if (colDims.length === 1) {
      if (colDims[0] === 'lm') return [...colLabels].sort((a, b) => monthOrder(a) - monthOrder(b));
      const cTot = {};
      for (const { sub } of tbl.values())
        for (const [c, v] of sub) cTot[c] = (cTot[c] || 0) + getMetricVal(v, pm);
      return [...colLabels].sort((a, b) => (cTot[b] || 0) - (cTot[a] || 0));
    }

    // 2 col dims: group composites by c0, sort c0s, then sort c1s within each c0 group
    const groups = new Map(); // c0 → Set<c1>
    for (const ck of colLabels) {
      const sep = ck.indexOf(COL_SEP);
      const c0 = ck.slice(0, sep), c1 = ck.slice(sep + 1);
      if (!groups.has(c0)) groups.set(c0, new Set());
      groups.get(c0).add(c1);
    }
    // sort c0
    let c0vals = [...groups.keys()];
    if (colDims[0] === 'lm') {
      c0vals.sort((a, b) => monthOrder(a) - monthOrder(b));
    } else {
      const c0Tot = {};
      for (const { sub } of tbl.values())
        for (const [ck, v] of sub) {
          const c0 = ck.slice(0, ck.indexOf(COL_SEP));
          c0Tot[c0] = (c0Tot[c0] || 0) + getMetricVal(v, pm);
        }
      c0vals.sort((a, b) => (c0Tot[b] || 0) - (c0Tot[a] || 0));
    }
    // sort c1 within each c0 group
    const result = [];
    for (const c0 of c0vals) {
      let c1vals = [...groups.get(c0)];
      if (colDims[1] === 'lm') {
        c1vals.sort((a, b) => monthOrder(a) - monthOrder(b));
      } else {
        const c1Tot = {};
        for (const { sub } of tbl.values())
          for (const [ck, v] of sub) {
            const sep = ck.indexOf(COL_SEP);
            if (ck.slice(0, sep) === c0) {
              const c1 = ck.slice(sep + 1);
              c1Tot[c1] = (c1Tot[c1] || 0) + getMetricVal(v, pm);
            }
          }
        c1vals.sort((a, b) => (c1Tot[b] || 0) - (c1Tot[a] || 0));
      }
      for (const c1 of c1vals) result.push(c0 + COL_SEP + c1);
    }
    return result;
  }, [pivotResult, colDims, pm]);

  // Outer column groups for 2-col-dim header row
  const colGroups = useMemo(() => {
    if (colDims.length < 2) return [];
    const groups = [];
    let i = 0;
    while (i < orderedCols.length) {
      const c0 = orderedCols[i].slice(0, orderedCols[i].indexOf(COL_SEP));
      let span = 0;
      while (i < orderedCols.length && orderedCols[i].slice(0, orderedCols[i].indexOf(COL_SEP)) === c0) { span++; i++; }
      groups.push({ c0, span });
    }
    return groups;
  }, [orderedCols, colDims]);

  const sortedRows = useMemo(() => {
    if (!pivotResult) return [];
    const rows = [];
    for (const [label, entry] of pivotResult.tbl) {
      const total = rowTotal(entry.sub, pm);
      rows.push({ label, entry, total });
    }
    rows.sort((a, b) => {
      let av, bv;
      if (sortBy === '__total__') { av = a.total; bv = b.total; }
      else if (sortBy === '__label__') { av = a.label; bv = b.label; }
      else { av = getMetricVal(a.entry.sub.get(sortBy), pm); bv = getMetricVal(b.entry.sub.get(sortBy), pm); }
      if (av === bv) return 0;
      if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === 'asc' ? av - bv : bv - av;
    });
    return topN > 0 ? rows.slice(0, topN) : rows;
  }, [pivotResult, pm, sortBy, sortDir, topN]);

  const grandTotals = useMemo(() => {
    if (!pivotResult) return { colVals: {}, gl: 0, gr: 0 };
    const colVals = {};
    let gl = 0, gr = 0;
    for (const { sub } of pivotResult.tbl.values()) {
      for (const [c, v] of sub) {
        if (!colVals[c]) colVals[c] = [0, 0, 0, 0];
        for (let i = 0; i < 4; i++) colVals[c][i] += v[i];
        gl += v[0]; gr += v[1];
      }
    }
    return { colVals, gl, gr };
  }, [pivotResult]);

  const unapplied = useMemo(() => {
    if (!matConfig) return [];
    const ds  = new Set(matConfig.dims);
    const all = new Set([...rowDims, ...colDims]);
    const out = [];
    if (filters.sources?.size > 0 && !ds.has('src') && !all.has('src')) out.push('Source');
    if (filters.states?.size  > 0 && !ds.has('st')  && !all.has('st'))  out.push('State');
    if (filters.models?.size  > 0 && !ds.has('mdl') && !all.has('mdl')) out.push('Model');
    return out;
  }, [matConfig, filters, rowDims, colDims]);

  function toggleCollapse(label) {
    setCollapsed(prev => {
      const next = new Set(prev);
      next.has(label) ? next.delete(label) : next.add(label);
      return next;
    });
  }

  function toggleMetric(key) {
    setMetrics(prev =>
      prev.includes(key)
        ? prev.length > 1 ? prev.filter(k => k !== key) : prev
        : [...prev, key]
    );
  }

  function addRowDim(key) {
    if (rowDims.includes(key) || colDims.includes(key)) return;
    setRowDims([...rowDims, key]);
    setAddRowOpen(false);
    setCollapsed(new Set());
  }

  function removeRowDim(idx) {
    if (rowDims.length === 1) return;
    setRowDims(rowDims.filter((_, i) => i !== idx));
    setCollapsed(new Set());
  }

  function addColDim(key) {
    if (colDims.includes(key) || rowDims.includes(key)) return;
    setColDims([...colDims, key]);
    setAddColOpen(false);
    setSortBy('__total__');
  }

  function removeColDim(idx) {
    if (colDims.length === 1) return;
    setColDims(colDims.filter((_, i) => i !== idx));
    setSortBy('__total__');
  }

  function handleExport() {
    if (!pivotResult || sortedRows.length === 0) return;
    const hasR2  = rowDims.length > 1;
    const hasC2  = colDims.length > 1;
    const dimLbl = k => DIMS.find(d => d.key === k)?.label || k;
    const mLbl   = k => METRICS.find(x => x.key === k)?.label || k;
    const colLabel = ck => hasC2
      ? ck.slice(0, ck.indexOf(COL_SEP)) + ' — ' + ck.slice(ck.indexOf(COL_SEP) + 1)
      : ck;

    const hdr = [dimLbl(rowDims[0])];
    if (hasR2) hdr.push(dimLbl(rowDims[1]));
    for (const ck of orderedCols)
      for (const m of metrics)
        hdr.push(metrics.length > 1 ? `${colLabel(ck)} — ${mLbl(m)}` : colLabel(ck));
    for (const m of metrics)
      hdr.push(metrics.length > 1 ? `TOTAL — ${mLbl(m)}` : 'TOTAL');

    const aoa = [hdr];
    const pushCells = (arr, cMap) => {
      for (const ck of orderedCols)
        for (const m of metrics) {
          const v = getMetricVal(cMap.get(ck), m);
          arr.push(m === 'retpct' ? +(v.toFixed(2)) : v);
        }
      for (const m of metrics) {
        const t = rowTotal(cMap, m);
        arr.push(m === 'retpct' ? +(t.toFixed(2)) : t);
      }
    };
    for (const { label, entry } of sortedRows) {
      if (!hasR2) { const r = [label]; pushCells(r, entry.sub); aoa.push(r); }
      else {
        const rSub = [label, 'Subtotal']; pushCells(rSub, entry.sub); aoa.push(rSub);
        for (const [r2Lbl, cMap] of entry.children) {
          const rChild = ['', r2Lbl]; pushCells(rChild, cMap); aoa.push(rChild);
        }
      }
    }
    const gtRow = hasR2 ? ['GRAND TOTAL', ''] : ['GRAND TOTAL'];
    for (const ck of orderedCols)
      for (const m of metrics) {
        const v = getMetricVal(grandTotals.colVals[ck], m);
        gtRow.push(m === 'retpct' ? +(v.toFixed(2)) : v);
      }
    for (const m of metrics) {
      let t = 0;
      if (m === 'retpct') t = grandTotals.gl > 0 ? +(grandTotals.gr/grandTotals.gl*100).toFixed(2) : 0;
      else { for (const { sub } of pivotResult.tbl.values()) for (const v of sub.values()) t += getMetricVal(v, m); t = +t.toFixed(2); }
      gtRow.push(t);
    }
    aoa.push(gtRow);
    exportXlsx({ ['Pivot']: aoa }, `TVS_Pivot_${Date.now()}`);
  }

  const hasR2        = rowDims.length > 1;
  const hasC2        = colDims.length > 1;
  const multiMetric  = metrics.length > 1;
  const allDims      = [...rowDims, ...colDims];
  const unsupported      = new Set(allDims).size < allDims.length || !matConfig;
  const awaitingPipeline = !unsupported && !(data[matConfig?.key]);
  const noData           = !unsupported && !awaitingPipeline && (!pivotResult || pivotResult.tbl.size === 0);

  const selSt = { padding:'6px 10px', fontSize:13, border:'1px solid #CBD5E1', borderRadius:8,
                  background:'#fff', color:'#0f172a', fontFamily:'inherit', cursor:'pointer' };

  const makePill = (dim, onRemove, canRemove) => {
    const label = DIMS.find(d => d.key === dim)?.label || dim;
    return ce('span', { key: dim,
      style:{ display:'inline-flex', alignItems:'center', gap:3, padding:'4px 10px',
              borderRadius:20, fontSize:12, fontWeight:600, background:'#1a3a5c', color:'#fff' }
    },
      label,
      canRemove && ce('span', {
        onClick: e => { e.stopPropagation(); onRemove(); },
        style:{ marginLeft:2, cursor:'pointer', opacity:0.75, fontSize:15, lineHeight:1 }
      }, '×')
    );
  };

  const addPillBtn = (onClick) =>
    ce('button', { onClick,
      style:{ padding:'4px 10px', borderRadius:20, fontSize:12, fontWeight:600,
              cursor:'pointer', border:'1.5px dashed #94A3B8',
              background:'#fff', color:'#64748B' }
    }, '+ Add');

  const dimDropdown = (items, onSelect) =>
    ce('div', { style:{ position:'absolute', top:'calc(100% + 4px)', left:0, zIndex:20,
        background:'#fff', border:'1px solid #E2E8F0', borderRadius:8,
        boxShadow:'0 4px 16px rgba(0,0,0,0.12)', minWidth:140, overflow:'hidden' } },
      items.map(d => ce('div', {
        key: d.key, onClick: () => onSelect(d.key),
        style:{ padding:'8px 14px', fontSize:13, cursor:'pointer', color:'#0f172a' },
        onMouseEnter: e => e.currentTarget.style.background = '#F1F5F9',
        onMouseLeave: e => e.currentTarget.style.background = '',
      }, d.label))
    );

  const metricPill = m => {
    const active = metrics.includes(m.key);
    return ce('span', { key: m.key, onClick: () => toggleMetric(m.key),
      style:{ display:'inline-flex', alignItems:'center', padding:'4px 10px',
              borderRadius:20, fontSize:12, fontWeight:600, cursor:'pointer', userSelect:'none',
              border: active ? '1.5px solid #1a3a5c' : '1.5px solid #CBD5E1',
              background: active ? '#1a3a5c' : '#fff',
              color: active ? '#fff' : '#475569' }
    }, m.label);
  };

  // ── Render ────────────────────────────────────────────────────────
  return ce('div', { style:{ padding:'0 4px' } },

    /* ── Config bar ── */
    ce('div', { style:{ display:'flex', gap:14, flexWrap:'wrap', alignItems:'flex-start',
        padding:'16px 18px', background:'#F8FAFC', borderRadius:12,
        border:'1px solid #E2E8F0', marginBottom:14 } },

      /* ROWS */
      ce('div', { style:{ minWidth:80 } },
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Rows'),
        ce('div', { style:{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' } },
          rowDims.map((dim, idx) => makePill(dim, () => removeRowDim(idx), rowDims.length > 1)),
          rowDims.length < 2 &&
            ce('div', { style:{ position:'relative' } },
              addPillBtn(() => setAddRowOpen(o => !o)),
              addRowOpen && dimDropdown(
                DIMS.filter(d => !rowDims.includes(d.key) && !colDims.includes(d.key)),
                addRowDim
              )
            )
        )
      ),

      ce('div', { style:{color:'#CBD5E1',fontSize:22,alignSelf:'center',fontWeight:300,paddingTop:18} }, '×'),

      /* COLUMNS */
      ce('div', { style:{ minWidth:80 } },
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Columns'),
        ce('div', { style:{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' } },
          colDims.map((dim, idx) => makePill(dim, () => removeColDim(idx), colDims.length > 1)),
          colDims.length < 2 &&
            ce('div', { style:{ position:'relative' } },
              addPillBtn(() => setAddColOpen(o => !o)),
              addColOpen && dimDropdown(
                DIMS.filter(d => !colDims.includes(d.key) && !rowDims.includes(d.key)),
                addColDim
              )
            )
        )
      ),

      ce('div', { style:{width:1,height:40,background:'#E2E8F0',alignSelf:'center',marginTop:20} }),

      /* VALUES */
      ce('div', null,
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Values'),
        ce('div', { style:{ display:'flex', gap:6, flexWrap:'wrap' } },
          METRICS.map(metricPill)
        )
      ),

      ce('div', { style:{width:1,height:40,background:'#E2E8F0',alignSelf:'center',marginTop:20} }),

      /* SORT — hide per-column sort when 2 col dims (composite keys aren't readable labels) */
      ce('div', null,
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Sort By'),
        ce('select', { value:sortBy, onChange:e=>setSortBy(e.target.value), style:selSt },
          ce('option',{value:'__total__'},'Total'),
          ce('option',{value:'__label__'},'Row Label'),
          ...(!hasC2 ? orderedCols.slice(0,8).map(c => ce('option',{key:c,value:c}, c.length>15?c.slice(0,14)+'…':c)) : [])
        )
      ),

      ce('div', null,
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Order'),
        ce('select', { value:sortDir, onChange:e=>setSortDir(e.target.value), style:selSt },
          ce('option',{value:'desc'},'↓  High → Low'),
          ce('option',{value:'asc' },'↑  Low → High'),
        )
      ),

      ce('div', null,
        ce('div', { style:{fontSize:10,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6} }, 'Show'),
        ce('select', { value:topN, onChange:e=>setTopN(+e.target.value), style:selSt },
          ce('option',{value:10 },'Top 10'),
          ce('option',{value:20 },'Top 20'),
          ce('option',{value:50 },'Top 50'),
          ce('option',{value:100},'Top 100'),
          ce('option',{value:0  },'All rows'),
        )
      ),

      !unsupported && !noData && !awaitingPipeline &&
        ce('div', { style:{marginLeft:'auto',alignSelf:'flex-end',paddingTop:20} },
          ce(ExportBtn, { onClick: handleExport })
        ),
    ),

    /* click-away overlays for dropdowns */
    (addRowOpen || addColOpen) && ce('div', {
      style:{position:'fixed',inset:0,zIndex:10},
      onClick:()=>{ setAddRowOpen(false); setAddColOpen(false); }
    }),

    /* ── Unapplied-filter warning ── */
    unapplied.length > 0 && ce('div', {
      style:{ padding:'7px 14px', background:'#FFF3CD', border:'1px solid #F5A623',
              borderRadius:8, fontSize:12, color:'#92400E', marginBottom:12 }
    }, `⚠  ${unapplied.join(', ')} filter${unapplied.length>1?'s':''} not applied — not a dimension in this matrix.`),

    /* ── State messages ── */
    unsupported && ce('div', { style:{ textAlign:'center', padding:50, color:'#94A3B8', fontSize:14 } },
      new Set(allDims).size < allDims.length
        ? 'A dimension cannot appear in both Rows and Columns.'
        : `The combination ${rowDims.map(k=>DIMS.find(d=>d.key===k)?.label||k).join(' + ')} × ${colDims.map(k=>DIMS.find(d=>d.key===k)?.label||k).join(' + ')} is not supported — no matching data matrix.`
    ),

    awaitingPipeline && ce('div', { style:{ textAlign:'center', padding:50, color:'#94A3B8', fontSize:14 } },
      '📦 This combination will be available after the next pipeline run.'
    ),

    noData && ce('div', { style:{ textAlign:'center', padding:50, color:'#94A3B8', fontSize:14 } },
      'No data matches the current filters.'
    ),

    /* ── Pivot table ── */
    !unsupported && !awaitingPipeline && !noData &&
    ce('div', { style:{ overflowX:'auto', borderRadius:12, border:'1px solid #E2E8F0' } },
      ce('table', { style:{ width:'100%', borderCollapse:'collapse', fontSize:13 } },

        ce('thead', null, (() => {
          // Header layout:
          // showOuterRow: col1 groups (hasC2) OR col values spanning metrics (!hasC2+multiMetric)
          // showMidRow:   col2 values each spanning metrics (hasC2 + multiMetric only)
          // bottomRow:    row-dim labels + innermost headers + TOTAL (always)
          const showOuterRow = hasC2 || multiMetric;
          const showMidRow   = hasC2 && multiMetric;
          const numHdrRows   = (showOuterRow ? 1 : 0) + (showMidRow ? 1 : 0) + 1;
          const topBg   = '#1a3a5c';
          const midBg   = '#163258';
          const botBg   = numHdrRows > 1 ? '#112844' : '#1a3a5c';

          // Label cell helper for row-dim columns
          const rowLabelTh = (dim, i, bg, small) =>
            ce('th', { key:`rl_${dim}`,
              style:{ padding: small?'6px 16px':'10px 16px', textAlign:'left', fontWeight:700,
                      whiteSpace:'nowrap', color:'#fff',
                      position: i===0 ? 'sticky' : undefined, left: i===0 ? 0 : undefined,
                      background: i===0 ? bg : undefined,
                      minWidth: i===0 ? 140 : 110,
                      borderRight: i===rowDims.length-1 ? '1px solid rgba(255,255,255,0.15)' : 'none',
                      cursor: i===0 ? 'pointer' : 'default', userSelect:'none' },
              onClick: i===0 ? ()=>{ setSortBy('__label__'); setSortDir(d=>d==='asc'?'desc':'asc'); } : undefined
            }, (DIMS.find(d=>d.key===dim)?.label||dim) + (i===0&&sortBy==='__label__'?(sortDir==='asc'?' ↑':' ↓'):''));

          const rows = [];

          // ── OUTER ROW ──────────────────────────────────────────────
          if (showOuterRow) {
            rows.push(ce('tr', { key:'hdr0', style:{ background:topBg, color:'#fff' } },
              ce('th', { colSpan: rowDims.length,
                style:{ padding:'7px 16px', textAlign:'left', fontWeight:700, color:'#fff',
                        position:'sticky', left:0, background:topBg,
                        borderRight:'1px solid rgba(255,255,255,0.15)' }
              }, rowDims.map(k=>DIMS.find(d=>d.key===k)?.label||k).join(' → ')),

              ...(hasC2
                // col1 group cells
                ? colGroups.map(({c0, span}, gi) =>
                    ce('th', { key:`cg_${c0}`, colSpan: span * metrics.length,
                      style:{ padding:'7px 12px', textAlign:'center', fontWeight:600, whiteSpace:'nowrap', color:'#fff',
                              borderLeft: gi===0 ? 'none' : '1px solid rgba(255,255,255,0.15)' }
                    }, c0)
                  )
                // col values each spanning metrics (single col dim + multiMetric)
                : orderedCols.map((col, ci) =>
                    ce('th', { key:`cv_${col}`, colSpan: metrics.length,
                      style:{ padding:'7px 12px', textAlign:'center', fontWeight:600, whiteSpace:'nowrap', color:'#fff',
                              borderLeft: ci===0 ? 'none' : '1px solid rgba(255,255,255,0.15)' }
                    }, col)
                  )
              ),

              ce('th', { colSpan: metrics.length,
                style:{ padding:'7px 12px', textAlign:'center', fontWeight:700, color:'#fff',
                        borderLeft:'2px solid rgba(255,255,255,0.3)' }
              }, 'TOTAL')
            ));
          }

          // ── MIDDLE ROW (hasC2 + multiMetric) ───────────────────────
          if (showMidRow) {
            rows.push(ce('tr', { key:'hdr1', style:{ background:midBg, color:'#fff' } },
              ce('th', { colSpan: rowDims.length,
                style:{ padding:'6px 16px', position:'sticky', left:0, background:midBg,
                        borderRight:'1px solid rgba(255,255,255,0.15)' }
              }, ''),
              ...orderedCols.map((ck, ci) => {
                const c1 = ck.slice(ck.indexOf(COL_SEP) + 1);
                const prevC0 = ci > 0 ? orderedCols[ci-1].slice(0, orderedCols[ci-1].indexOf(COL_SEP)) : null;
                const thisC0 = ck.slice(0, ck.indexOf(COL_SEP));
                return ce('th', { key:`cm_${ck}`, colSpan: metrics.length,
                  style:{ padding:'6px 10px', textAlign:'center', fontWeight:500, whiteSpace:'nowrap', color:'#fff', fontSize:12,
                          borderLeft: (ci===0||thisC0!==prevC0) ? '1px solid rgba(255,255,255,0.15)' : 'none' }
                }, c1);
              }),
              ce('th', { colSpan: metrics.length,
                style:{ padding:'6px 10px', textAlign:'center', color:'rgba(255,255,255,0.5)',
                        borderLeft:'2px solid rgba(255,255,255,0.3)', fontSize:11 }
              }, 'Total')
            ));
          }

          // ── BOTTOM ROW (always) ────────────────────────────────────
          rows.push(ce('tr', { key:'hdrB', style:{ background:botBg, color:'#fff' } },
            // Row dim label ths
            rowDims.map((dim, i) => rowLabelTh(dim, i, botBg, numHdrRows > 1)),

            // Data column cells
            ...orderedCols.flatMap((ck, ci) => {
              const prevC0 = ci > 0 ? orderedCols[ci-1].slice(0, orderedCols[ci-1].indexOf(COL_SEP)) : null;
              const thisC0 = hasC2 ? ck.slice(0, ck.indexOf(COL_SEP)) : null;
              const groupBorder = hasC2 && (ci===0 || thisC0!==prevC0);

              if (multiMetric) {
                return metrics.map((m, mi) =>
                  ce('th', { key:`bot_${ck}_${m}`,
                    style:{ padding:'6px 10px', textAlign:'right', fontWeight:500, whiteSpace:'nowrap',
                            fontSize:11, color:'rgba(255,255,255,0.85)',
                            borderLeft: mi===0&&groupBorder ? '1px solid rgba(255,255,255,0.15)'
                                       : mi===0&&ci>0&&!hasC2 ? '1px solid rgba(255,255,255,0.1)' : 'none' }
                  }, METRICS.find(x=>x.key===m)?.label||m)
                );
              }
              // single metric
              const colLabel = hasC2
                ? ck.slice(ck.indexOf(COL_SEP) + 1) // show c1 value
                : ck;                                 // show col value + sort indicator
              const sortable = !hasC2;
              return [ce('th', { key:`bot_${ck}`,
                style:{ padding: numHdrRows>1?'6px 12px':'10px 12px', textAlign:'right',
                        fontWeight:600, whiteSpace:'nowrap', minWidth: multiMetric?68:80,
                        borderLeft: groupBorder ? '1px solid rgba(255,255,255,0.15)'
                                   : ci>0&&!hasC2 ? '1px solid rgba(255,255,255,0.1)' : 'none',
                        cursor: sortable ? 'pointer' : 'default', userSelect:'none' },
                onClick: sortable ? ()=>{ setSortBy(ck); setSortDir(d=>d==='asc'?'desc':'asc'); } : undefined
              }, colLabel + (sortable&&sortBy===ck?(sortDir==='asc'?' ↑':' ↓'):''))];
            }),

            // TOTAL header(s)
            ...metrics.map((m, mi) => {
              const sortable = !multiMetric;
              return ce('th', { key:`btot_${m}`,
                style:{ padding: numHdrRows>1?'6px 10px':'10px 12px', textAlign:'right',
                        fontWeight:700, whiteSpace:'nowrap',
                        fontSize: multiMetric?11:13,
                        borderLeft: mi===0 ? '2px solid rgba(255,255,255,0.3)' : 'none',
                        cursor: sortable ? 'pointer' : 'default', userSelect:'none' },
                onClick: sortable ? ()=>{ setSortBy('__total__'); setSortDir(d=>d==='asc'?'desc':'asc'); } : undefined
              }, multiMetric ? (METRICS.find(x=>x.key===m)?.label||m)
                             : ('TOTAL'+(sortBy==='__total__'?(sortDir==='asc'?' ↑':' ↓'):'')));
            })
          ));

          return rows;
        })()),

        ce('tbody', null,
          sortedRows.flatMap(({ label, entry }, rowIdx) => {
            const isCollapsed = hasR2 && collapsed.has(label);
            const bg0 = rowIdx%2===0 ? '#fff' : '#F8FAFC';
            const rows = [];

            // Primary row
            rows.push(ce('tr', {
              key: `p_${label}`,
              style:{ background: hasR2 ? '#EFF6FF' : bg0, cursor: hasR2 ? 'pointer' : 'default' },
              onClick: hasR2 ? () => toggleCollapse(label) : undefined
            },
              // Primary label (sticky)
              ce('td', {
                style:{ padding:'8px 16px', fontWeight:700, color:'#1a3a5c',
                        position:'sticky', left:0, background: hasR2?'#EFF6FF':bg0,
                        borderRight:'1px solid #E2E8F0', whiteSpace:'nowrap' }
              }, hasR2 ? (isCollapsed?'▶ ':'▼ ')+label : label),
              // Secondary label col: "Subtotal" label or collapsed item count
              hasR2 && ce('td', {
                style:{ padding:'8px 10px', color:'#94A3B8', fontSize:12,
                        fontStyle:'italic', whiteSpace:'nowrap' }
              }, isCollapsed ? `(${entry.children.size} items)` : 'Subtotal'),
              // Data cells from sub (subtotals)
              ...orderedCols.flatMap((ck, ci) => {
                const prevC0 = ci > 0 ? orderedCols[ci-1].slice(0, orderedCols[ci-1].indexOf(COL_SEP)) : null;
                const thisC0 = hasC2 ? ck.slice(0, ck.indexOf(COL_SEP)) : null;
                const groupBorder = hasC2 && (ci===0 || thisC0!==prevC0);
                return metrics.map((m, mi) =>
                  ce('td', { key:`${ck}_${m}`,
                    style:{ padding:'8px 12px', textAlign:'right',
                            color: hasR2?'#1a3a5c':'#374151',
                            fontWeight: hasR2?600:400,
                            borderLeft: mi===0&&(groupBorder||(multiMetric&&ci>0)) ? '1px solid #E2E8F0' : 'none' }
                  }, fmtV(entry.sub.get(ck), m))
                );
              }),
              // Row totals
              ...metrics.map((m, mi) =>
                ce('td', { key:`tot_${m}`,
                  style:{ padding:'8px 12px', textAlign:'right', fontWeight:700, color:'#1a3a5c',
                          borderLeft: mi===0 ? '2px solid #E2E8F0' : 'none' }
                }, fmtTotal(entry.sub, m))
              )
            ));

            // Child rows (secondary dim, only when expanded)
            if (hasR2 && !isCollapsed) {
              let ci = 0;
              for (const [r2Label, cMap] of entry.children) {
                const cBg = ci++%2===0 ? '#fff' : '#F8FAFC';
                rows.push(ce('tr', { key:`c_${label}_${r2Label}`, style:{ background:cBg } },
                  // Empty first col (sticky)
                  ce('td', {
                    style:{ padding:'7px 16px', position:'sticky', left:0,
                            background:cBg, borderRight:'1px solid #E2E8F0' }
                  }, ''),
                  // Secondary label
                  ce('td', {
                    style:{ padding:'7px 10px 7px 20px', color:'#374151', fontSize:12, whiteSpace:'nowrap' }
                  }, r2Label),
                  // Data cells
                  ...orderedCols.flatMap((ck, colI) => {
                    const prevC0 = colI > 0 ? orderedCols[colI-1].slice(0, orderedCols[colI-1].indexOf(COL_SEP)) : null;
                    const thisC0 = hasC2 ? ck.slice(0, ck.indexOf(COL_SEP)) : null;
                    const groupBorder = hasC2 && (colI===0 || thisC0!==prevC0);
                    return metrics.map((m, mi) =>
                      ce('td', { key:`${ck}_${m}`,
                        style:{ padding:'7px 12px', textAlign:'right', color:'#374151',
                                fontSize:12,
                                borderLeft: mi===0&&(groupBorder||(multiMetric&&colI>0)) ? '1px solid #E2E8F0' : 'none' }
                      }, fmtV(cMap.get(ck), m))
                    );
                  }),
                  // Row totals
                  ...metrics.map((m, mi) =>
                    ce('td', { key:`tot_${m}`,
                      style:{ padding:'7px 12px', textAlign:'right', fontWeight:600, color:'#374151',
                              fontSize:12, borderLeft: mi===0 ? '2px solid #E2E8F0' : 'none' }
                    }, fmtTotal(cMap, m))
                  )
                ));
              }
            }

            return rows;
          }),

          /* Grand total row */
          ce('tr', { style:{ background:'#EEF2FF', borderTop:'2px solid #CBD5E1', fontWeight:700 } },
            ce('td', {
              colSpan: rowDims.length,
              style:{ padding:'10px 16px', color:'#1a3a5c', position:'sticky', left:0,
                      background:'#EEF2FF', borderRight:'1px solid #CBD5E1' }
            }, 'GRAND TOTAL'),
            ...orderedCols.flatMap((ck, ci) => {
              const prevC0 = ci > 0 ? orderedCols[ci-1].slice(0, orderedCols[ci-1].indexOf(COL_SEP)) : null;
              const thisC0 = hasC2 ? ck.slice(0, ck.indexOf(COL_SEP)) : null;
              const groupBorder = hasC2 && (ci===0 || thisC0!==prevC0);
              const cv = grandTotals.colVals[ck];
              return metrics.map((m, mi) =>
                ce('td', { key:`gt_${ck}_${m}`,
                  style:{ padding:'10px 12px', textAlign:'right', color:'#1a3a5c',
                          borderLeft: mi===0&&(groupBorder||(multiMetric&&ci>0)) ? '1px solid #CBD5E1' : 'none' }
                }, fmtV(cv, m))
              );
            }),
            ...metrics.map((m, mi) => {
              let display;
              if (m === 'retpct') {
                display = grandTotals.gl>0 ? (grandTotals.gr/grandTotals.gl*100).toFixed(1)+'%' : '—';
              } else {
                let t = 0;
                for (const { sub } of pivotResult.tbl.values()) for (const v of sub.values()) t += getMetricVal(v, m);
                display = t > 0 ? t.toLocaleString() : '—';
              }
              return ce('td', { key:`gt_tot_${m}`,
                style:{ padding:'10px 12px', textAlign:'right',
                        borderLeft: mi===0 ? '2px solid #CBD5E1' : 'none', color:'#1a3a5c' }
              }, display);
            })
          )
        )
      )
    )
  );
});

/* ════════════════════════════════════════════════════════════════════
   BOOTSTRAP
   ════════════════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(ce(App));
</script>
</body>
</html>
